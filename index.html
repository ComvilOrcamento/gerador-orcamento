<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Catálogo Comvil</title>
    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        body { background-color: #f1f5f9; padding: 30px; display: flex; justify-content: center; }
        .admin-box { background: white; width: 100%; max-width: 800px; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; }
        h1 { font-size: 22px; color: #0f172a; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { padding: 10px 20px; border: 1px solid #cbd5e1; border-radius: 6px; background: #f8fafc; cursor: pointer; font-weight: bold; color: #64748b; }
        .tab-btn.active { background: #0f172a; color: white; border-color: #0f172a; }
        .tab-content { display: none; margin-bottom: 20px; }
        .tab-content.active { display: block; }
        
        .form-row { display: flex; gap: 15px; margin-bottom: 12px; align-items: flex-end; width: 100%; }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 12px; font-weight: bold; color: #475569; }
        input, select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; outline: none; background: #fff; width: 100%; height: 38px; }
        input:focus { border-color: #2563eb; }
        
        .w-nome { width: 68%; }
        .w-preco { width: 17%; }
        .w-acao { width: 15%; }
        
        .btn-add { background: #2563eb; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; white-space: nowrap; width: 100%; height: 38px; display: flex; align-items: center; justify-content: center; }
        .btn-add:hover { background: #1d4ed8; }
        
        .data-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; table-layout: fixed; }
        .data-table th, .data-table td { border: 1px solid #e2e8f0; padding: 10px; text-align: left; vertical-align: middle; overflow: hidden; }
        .data-table th { background: #f8fafc; color: #334155; height: 38px; }
        
        .table-input { width: 100%; padding: 6px; border: 1px solid transparent; background: transparent; font-size: 14px; cursor: text; }
        .table-input:focus { border-color: #2563eb; background: #fff; outline: none; border-radius: 4px; }
        
        .actions-cell { display: flex; align-items: center; gap: 6px; width: 100%; justify-content: flex-start; }
        .order-arrows-column { display: flex; flex-direction: column; gap: 2px; }
        
        .btn-control { border: 1px solid #cbd5e1; padding: 2px 5px; border-radius: 4px; cursor: pointer; font-size: 8px; font-weight: bold; background: #fff; text-align: center; line-height: 1; }
        .btn-control:hover { background: #f1f5f9; border-color: #94a3b8; }
        
        .btn-del { background: #ef4444; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; height: 26px; display: flex; align-items: center; justify-content: center; flex: 1; }
        .btn-del:hover { background: #dc2626; }
        
        .action-zone { border-top: 2px solid #e2e8f0; padding-top: 20px; margin-top: 25px; display: flex; gap: 15px; }
        .btn-save { flex: 1; background: #003366; color: white; border: none; padding: 14px 20px; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0, 51, 102, 0.2); }
        .btn-save:hover { background: #002244; }
        .btn-export { flex: 1; background: #10b981; color: white; border: none; padding: 14px 20px; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2); }
        .btn-export:hover { background: #059669; }

        .toast-notificacao {
            position: fixed;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            background: #0f172a;
            color: #10b981;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: bold;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transition: top 0.3s ease;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #10b981;
        }
        .toast-notificacao.show { top: 20px; }
    </style>
</head>
<body>

<div id="toast" class="toast-notificacao">✓ Configurações salvas!</div>

<div class="admin-box">
    <h1>Gerenciador de Catálogo de Preços</h1>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(event, 'tab-produtos')">Produtos / Sacolas</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-cordoes')">Cordões / Alças</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-quantidades')">Quantidades Mínimas</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-acabamentos')">Custos de Acabamento</button>
    </div>

    <!-- ABA 1: PRODUTOS CONFIGURADOS -->
    <div id="tab-produtos" class="tab-content active">
        <div class="form-row">
            <div class="input-group w-nome">
                <label>Nome Comercial Exibido no Menu</label>
                <input type="text" id="prodNome" placeholder="Ex: Sacola Duplex 240g - 25x35x10">
            </div>
            <div class="input-group w-preco">
                <label>Preço Base (R$)</label>
                <input type="number" id="prodPreco" step="0.01" placeholder="4.00">
            </div>
            <div class="input-group w-acao">
                <button class="btn-add" onclick="adicionarProduto()">Adicionar</button>
            </div>
        </div>
        <table class="data-table" id="tableProdutos">
            <thead>
                <tr>
                    <th class="w-nome">Nome Comercial</th>
                    <th class="w-preco">Preço Base (R$)</th>
                    <th class="w-acao">Ações</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- ABA 2: CORDÕES / ALÇAS -->
    <div id="tab-cordoes" class="tab-content">
        <div class="form-row">
            <div class="input-group w-nome">
                <label>Tipo de Alça / Cordão</label>
                <input type="text" id="cordaoNome" placeholder="Ex: Nylon, Gorgurão, Fita">
            </div>
            <div class="input-group w-preco">
                <label>Preço (R$)</label>
                <input type="number" id="cordaoPreco" step="0.01" placeholder="0.30">
            </div>
            <div class="input-group w-acao">
                <button class="btn-add" onclick="adicionarCordao()">Adicionar</button>
            </div>
        </div>
        <table class="data-table" id="tableCordoes">
            <thead>
                <tr>
                    <th class="w-nome">Tipo de Alça</th>
                    <th class="w-preco">Preço Unitário (R$)</th>
                    <th class="w-acao">Ações</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- ABA 3: QUANTIDADES MÍNIMAS -->
    <div id="tab-quantidades" class="tab-content">
        <div class="form-row">
            <div class="input-group" style="width: 85%;">
                <label>Nova Quantidade de Opção (Apenas Números)</label>
                <input type="number" id="qtdValor" placeholder="Ex: 500">
            </div>
            <div class="input-group" style="width: 15%;">
                <button class="btn-add" onclick="adicionarQuantidade()">Adicionar</button>
            </div>
        </div>
        <table class="data-table" id="tableQuantidades">
            <thead>
                <tr>
                    <th style="width: 85%;">Quantidade Comercial</th>
                    <th style="width: 15%;">Ações</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- ABA 4: COMPONENTES FIXOS -->
    <div id="tab-acabamentos" class="tab-content">
        <div class="form-row">
            <div class="input-group" style="flex: 1;">
                <label>Custo Adicional Ilhós (R$)</label>
                <input type="number" id="fixoIlhos" step="0.01">
            </div>
            <div class="input-group" style="flex: 1;">
                <label>Custo Adicional Furo Laço (R$)</label>
                <input type="number" id="fixoFuro" step="0.01">
            </div>
        </div>
        <h3 style="font-size: 14px; margin: 15px 0 10px 0; color: #475569;">Custo Adicional de Cores</h3>
        <div class="form-row">
            <div class="input-group"><label>Custo Cores 1x0 (R$)</label><input type="number" id="cor1x0" step="0.01"></div>
            <div class="input-group"><label>Custo Cores 2x0 (R$)</label><input type="number" id="cor2x0" step="0.01"></div>
            <div class="input-group"><label>Custo Cores 4x0 (R$)</label><input type="number" id="cor4x0" step="0.01"></div>
            <div class="input-group"><label>Custo Cores 4x1 (R$)</label><input type="number" id="cor4x1" step="0.01"></div>
        </div>
    </div>

    <div class="action-zone">
        <button class="btn-save" onclick="salvarAlteracoesLocais()">Salvar Alterações</button>
        <button class="btn-export" onclick="exportarJsonAtualizado()">Exportar dados.json</button>
    </div>
</div>

<script>
    const databaseFallback = {
        "produtosConfigurados": [
            { "id": 1, "nomeCompleto": "Sacola Duplex 240g - 25x35x10 - Plastificação Brilho", "detalhes": "Sacola Duplex 240g - 25x35x10 - Plastificação Brilho", "precoBase": 4.00 },
            { "id": 2, "nomeCompleto": "Sacola Offset 180g - 18x24x8 - Laminação BOPP Fosca", "detalhes": "Sacola Offset 180g - 18x24x8 - Laminação BOPP Fosca", "precoBase": 4.50 }
        ],
        "cordoes": [{ "nome": "Nylon", "preco": 0.30 }, { "nome": "Gorgurão", "preco": 0.80 }],
        "quantidades": [500, 1000, 2000, 3000, 4000, 5000],
        "valoresAcabamento": { "ilhos": 0.20, "furoLaco": 0.15, "cores": { "1x0": 0.0, "2x0": 0.15, "4x0": 0.4, "4x1": 0.4 } }
    };

    let currentData = JSON.parse(JSON.stringify(databaseFallback));

    window.onload = function() {
        const cacheLocal = localStorage.getItem('comvil_catalogo_cache');
        if (cacheLocal) {
            try {
                currentData = JSON.parse(cacheLocal);
            } catch(e) {
                currentData = JSON.parse(JSON.stringify(databaseFallback));
            }
            if(!currentData.quantidades || currentData.quantidades.length === 0) {
                currentData.quantidades = databaseFallback.quantidades;
            }
            renderAll();
        } else {
            fetch('dados.json')
                .then(res => res.json())
                .then(data => { 
                    currentData = data; 
                    if(!currentData.quantidades || currentData.quantidades.length === 0) {
                        currentData.quantidades = databaseFallback.quantidades;
                    }
                    renderAll(); 
                })
                .catch(() => { 
                    if(!currentData.quantidades || currentData.quantidades.length === 0) {
                        currentData.quantidades = databaseFallback.quantidades;
                    }
                    renderAll(); 
                });
        }
    };

    function switchTab(e, tabId) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        e.target.classList.add('active');
        document.getElementById(tabId).classList.add('active');
    }

    function renderAll() {
        const tbodyProd = document.querySelector('#tableProdutos tbody');
        if (tbodyProd) {
            tbodyProd.innerHTML = '';
            currentData.produtosConfigurados.forEach((p, idx) => {
                tbodyProd.innerHTML += `<tr>
                    <td class="w-nome"><input type="text" class="table-input" value="${p.nomeCompleto}" onchange="atualizarDadosInline('produtosConfigurados', ${idx}, 'nomeCompleto', this.value)"></td>
                    <td class="w-preco"><input type="number" step="0.01" class="table-input" value="${p.precoBase}" onchange="atualizarDadosInline('produtosConfigurados', ${idx}, 'precoBase', this.value)"></td>
                    <td class="w-acao">
                        <div class="actions-cell">
                            <div class="order-arrows-column">
                                <button class="btn-control" onclick="moverItem('produtosConfigurados', ${idx}, -1)">▲</button>
                                <button class="btn-control" onclick="moverItem('produtosConfigurados', ${idx}, 1)">▼</button>
                            </div>
                            <button class="btn-del" onclick="removerItem('produtosConfigurados', ${idx})">Excluir</button>
                        </div>
                    </td>
                </tr>`;
            });
        }

        const tbodyCord = document.querySelector('#tableCordoes tbody');
        if (tbodyCord) {
            tbodyCord.innerHTML = '';
            currentData.cordoes.forEach((c, idx) => {
                tbodyCord.innerHTML += `<tr>
                    <td class="w-nome"><input type="text" class="table-input" value="${c.nome}" onchange="atualizarDadosInline('cordoes', ${idx}, 'nome', this.value)"></td>
                    <td class="w-preco"><input type="number" step="0.01" class="table-input" value="${c.preco}" onchange="atualizarDadosInline('cordoes', ${idx}, 'preco', this.value)"></td>
                    <td class="w-acao">
                        <div class="actions-cell">
                            <div class="order-arrows-column">
                                <button class="btn-control" onclick="moverItem('cordoes', ${idx}, -1)">▲</button>
                                <button class="btn-control" onclick="moverItem('cordoes', ${idx}, 1)">▼</button>
                            </div>
                            <button class="btn-del" onclick="removerItem('cordoes', ${idx})">Excluir</button>
                        </div>
                    </td>
                </tr>`;
            });
        }

        const tbodyQtd = document.querySelector('#tableQuantidades tbody');
        if (tbodyQtd) {
            tbodyQtd.innerHTML = '';
            currentData.quantidades.forEach((q, idx) => {
                tbodyQtd.innerHTML += `<tr>
                    <td style="width: 85%;"><input type="number" step="1" class="table-input" value="${q}" onchange="atualizarDadosInline('quantidades', ${idx}, null, this.value)"></td>
                    <td style="width: 15%;">
                        <div class="actions-cell">
                            <div class="order-arrows-column">
                                <button class="btn-control" onclick="moverItem('quantidades', ${idx}, -1)">▲</button>
                                <button class="btn-control" onclick="moverItem('quantidades', ${idx}, 1)">▼</button>
                            </div>
                            <button class="btn-del" onclick="removerItem('quantidades', ${idx})">Excluir</button>
                        </div>
                    </td>
                </tr>`;
            });
        }

        if (document.getElementById('fixoIlhos') && currentData.valoresAcabamento) {
            document.getElementById('fixoIlhos').value = currentData.valoresAcabamento.ilhos ?? 0;
            document.getElementById('fixoFuro').value = currentData.valoresAcabamento.furoLaco ?? 0;
            if (currentData.valoresAcabamento.cores) {
                document.getElementById('cor1x0').value = currentData.valoresAcabamento.cores['1x0'] ?? 0;
                document.getElementById('cor2x0').value = currentData.valoresAcabamento.cores['2x0'] ?? 0;
                document.getElementById('cor4x0').value = currentData.valoresAcabamento.cores['4x0'] ?? 0;
                document.getElementById('cor4x1').value = currentData.valoresAcabamento.cores['4x1'] ?? 0;
            }
        }
    }

    function moverItem(tipo, index, direcao) {
        const novoIndex = index + direcao;
        if (novoIndex < 0 || novoIndex >= currentData[tipo].length) return;
        
        const temp = currentData[tipo][index];
        currentData[tipo][index] = currentData[tipo][novoIndex];
        currentData[tipo][novoIndex] = temp;
        
        renderAll();
    }

    function atualizarDadosInline(tipo, index, propriedade, novoValor) {
        if (tipo === 'quantidades') {
            const num = parseInt(novoValor);
            if (!isNaN(num) && num > 0) {
                currentData.quantidades[index] = num;
            }
        } else {
            if (propriedade === 'precoBase' || propriedade === 'preco') {
                currentData[tipo][index][propriedade] = parseFloat(novoValor) || 0;
            } else {
                currentData[tipo][index][propriedade] = novoValor.trim();
            }
        }
    }

    function adicionarProduto() {
        const nome = document.getElementById('prodNome').value.trim();
        const preco = parseFloat(document.getElementById('prodPreco').value);

        if(!nome || isNaN(preco)) { alert('Preencha os campos de nome e preço!'); return; }

        const novoId = currentData.produtosConfigurados.length > 0 ? Math.max(...currentData.produtosConfigurados.map(p => p.id)) + 1 : 1;
        currentData.produtosConfigurados.push({ "id": novoId, "nomeCompleto": nome, "detalhes": nome, "precoBase": preco });
        
        document.getElementById('prodNome').value = '';
        document.getElementById('prodPreco').value = '';
        renderAll();
    }

    function adicionarCordao() {
        const nome = document.getElementById('cordaoNome').value.trim();
        const preco = parseFloat(document.getElementById('cordaoPreco').value);

        if(!nome || isNaN(preco)) { alert('Preencha todos os campos do cordão!'); return; }

        currentData.cordoes.push({ "nome": nome, "preco": preco });
        document.getElementById('cordaoNome').value = '';
        document.getElementById('cordaoPreco').value = '';
        renderAll();
    }

    function adicionarQuantidade() {
        const valor = parseInt(document.getElementById('qtdValor').value);
        if(isNaN(valor) || valor <= 0) { alert('Insira um número válido de quantidade!'); return; }
        if(currentData.quantidades.includes(valor)) { alert('Esta quantidade já existe listada!'); return; }

        currentData.quantidades.push(valor);
        document.getElementById('qtdValor').value = '';
        renderAll();
    }

    function removerItem(tipo, index) {
        currentData[tipo].splice(index, 1);
        renderAll();
    }

    function sincronizarFormularioObjeto() {
        if (!currentData.valoresAcabamento) currentData.valoresAcabamento = {};
        if (!currentData.valoresAcabamento.cores) currentData.valoresAcabamento.cores = {};

        currentData.valoresAcabamento.ilhos = parseFloat(document.getElementById('fixoIlhos').value) || 0;
        currentData.valoresAcabamento.furoLaco = parseFloat(document.getElementById('fixoFuro').value) || 0;
        currentData.valoresAcabamento.cores['1x0'] = parseFloat(document.getElementById('cor1x0').value) || 0;
        currentData.valoresAcabamento.cores['2x0'] = parseFloat(document.getElementById('cor2x0').value) || 0;
        currentData.valoresAcabamento.cores['4x0'] = parseFloat(document.getElementById('cor4x0').value) || 0;
        currentData.valoresAcabamento.cores['4x1'] = parseFloat(document.getElementById('cor4x1').value) || 0;
        
        currentData.produtosConfigurados.forEach(p => {
            p.detalhes = p.nomeCompleto;
        });
    }

    function mostrarToastNotificacao() {
        const toast = document.getElementById('toast');
        if (toast) {
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
    }

    function salvarAlteracoesLocais() {
        sincronizarFormularioObjeto();
        localStorage.setItem('comvil_catalogo_cache', JSON.stringify(currentData));
        mostrarToastNotificacao();
        renderAll();
    }

    function exportarJsonAtualizado() {
        sincronizarFormularioObjeto();
        const jsonString = JSON.stringify(currentData, null, 2);
        const blob = new Blob([jsonString], { type: "application/json" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "dados.json";
        link.click();
        renderAll();
    }
</script>
</body>
</html>
