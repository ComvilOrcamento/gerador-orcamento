<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Orçamentos Comercial</title>
    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        body { background-color: #f4f4f6; padding: 20px; display: flex; justify-content: center; flex-direction: column; align-items: center; }
        
        /* SISTEMA DE NAVEGAÇÃO POR ABAS */
        .container-abas { width: 100%; max-width: 600px; display: flex; gap: 5px; margin-bottom: -1px; position: relative; z-index: 2; }
        .aba-btn { padding: 12px 20px; background: #e2e8f0; border: 1px solid #cbd5e1; border-bottom: none; border-radius: 8px 8px 0 0; cursor: pointer; font-size: 13px; font-weight: bold; color: #64748b; transition: all 0.2s; }
        .aba-btn:hover { background: #cbd5e1; color: #334155; }
        .aba-btn.active { background: white; border-color: #ccc; border-bottom: 1px solid white; color: #003366; padding-bottom: 13px; }
        
        .container { background: white; width: 100%; max-width: 600px; padding: 30px; border-radius: 0 8px 8px 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #ccc; position: relative; z-index: 1; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        h1 { font-size: 24px; margin-bottom: 20px; color: #000; }
        h2 { font-size: 14px; margin: 15px 0 10px 0; color: #333; font-weight: bold; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        .row { display: flex; gap: 15px; margin-bottom: 12px; }
        .field { flex: 1; display: flex; flex-direction: column; }
        label { font-size: 11px; margin-bottom: 4px; color: #555; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 13px; outline: none; background: #fff; height: 38px; }
        
        input:focus, select:focus { border-color: #0056b3; }
        input[readonly] { background-color: #f1f5f9; color: #64748b; border-color: #cbd5e1; cursor: not-allowed; }
        
        .btn-principal { width: 100%; background: #003366; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: bold; margin: 15px 0; }
        .btn-principal:hover { background: #002244; }
        
        .botoes-container { display: flex; gap: 15px; margin-top: 15px; width: 100%; }
        .btn-exportar { flex: 1; background: #0056b3; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: bold; height: 42px; }
        .btn-exportar:hover { background: #004085; }
        
        #area-orcamento { background: #ffffff; border: 1px solid #ddd; padding: 25px; margin-top: 15px; color: #333; border-radius: 6px; display: none; }
        .logos-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #0056b3; padding-bottom: 15px; gap: 15px; }
        .logo-box { flex: 1; display: flex; align-items: center; }
        .logo-box img { max-height: 55px; max-width: 150px; object-fit: contain; display: block; }
        .secao-preview { margin-bottom: 15px; background: #fafafa; padding: 12px; border-radius: 6px; border-left: 3px solid #0056b3; font-size: 13px; line-height: 1.5; }
        .preview-titulo { font-size: 10px; font-weight: bold; text-transform: uppercase; color: #777; margin-bottom: 5px; }
        
        .rodape-contato-preview { margin-top: 15px; border: 1px solid #dddddd; padding: 12px; border-radius: 6px; background-color: #fafafa; text-align: center; font-size: 11px; color: #555555; line-height: 1.5; }
    </style>
</head>
<body>

<!-- SELETOR DE ABAS DO SISTEMA (EXPANSÍVEL PARA NOVOS ITENS) -->
<div class="container-abas">
    <button class="aba-btn active" onclick="alternarAbasDoGerador(event, 'aba-sacolas')">Sacolas</button>
    <button class="aba-btn" onclick="alternarAbasDoGerador(event, 'aba-mao-eva')">Mão de Torcida em E.V.A</button>
</div>

<div class="container">
    <h1>Novo Orçamento</h1>

    <h2>Dados do cliente</h2>
    <div class="field" style="margin-bottom: 12px;">
        <label>Nome *</label>
        <input type="text" id="nomeCliente" placeholder="Nome do cliente ou Empresa (Obrigatório)" required>
    </div>
    <div class="row">
        <div class="field"><label>Telefone / WhatsApp *</label><input type="text" id="telCliente" placeholder="(00) 00000-0000 (Obrigatório)" oninput="mascaraTelefone(this)" maxlength="15" required></div>
        <div class="field"><label>E-mail</label><input type="email" id="emailCliente" placeholder="email@exemplo.com (Opcional)"></div>
    </div>

    <!-- CONTEÚDO DA ABA 1: SACOLAS (MANTIDO TOTALMENTE INTACTO E SEM ALTERAÇÕES) -->
    <div id="aba-sacolas" class="tab-content active">
        <h2>Itens do orçamento (Sacolas)</h2>
        <div class="field" style="margin-bottom: 12px;">
            <label>Configuração do Produto Base *</label>
            <select id="selectProdutoConfigurado"></select>
        </div>
        
        <div class="row">
            <div class="field">
                <label>Impressão / Cores *</label>
                <select id="selectCores">
                    <option value="1x0">1x0</option>
                    <option value="2x0">2x0</option>
                    <option value="4x0">4x0</option>
                    <option value="4x1">4x1</option>
                </select>
            </div>
            <div class="field">
                <label>Acabamento com Ilhós *</label>
                <select id="selectIlhos">
                    <option value="Não">Não</option>
                    <option value="Sim">Sim</option>
                </select>
            </div>
        </div>
        
        <div class="row">
            <div class="field">
                <label>Tipo de Cordão / Alça *</label>
                <select id="selectCordao"></select>
            </div>
            <div class="field">
                <label>Furo para Laço *</label>
                <select id="selectFuroLaco">
                    <option value="Não">Não</option>
                    <option value="Sim">Sim</option>
                </select>
            </div>
        </div>

        <div class="field" style="margin-bottom: 12px;">
            <label>Quantidade Mínima *</label>
            <select id="qtd"></select>
        </div>
    </div>

    <!-- CONTEÚDO DA ABA 2: MÃO DE TORCIDA EM E.V.A (NOVA E PARALELA) -->
    <div id="aba-mao-eva" class="tab-content">
        <h2>Itens do orçamento (Mão em E.V.A)</h2>
        <div class="row">
            <div class="field">
                <label>Modelo *</label>
                <select id="selectModeloEva">
                    <option value="Luva">Luva</option>
                    <option value="Argola">Argola</option>
                </select>
            </div>
            <div class="field">
                <label>Cores da Mão (E.V.A) *</label>
                <select id="selectCoresMaoEva">
                    <!-- Será preenchido via .json no futuro -->
                    <option value="">Aguardando dados comerciais...</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div class="field">
                <label>Quantidade Solicitada *</label>
                <select id="selectQtdEva" onchange="verificarQuantidadeVariavelEva(this)">
                    <option value="100">100 un</option>
                    <option value="200">200 un</option>
                    <option value="300">300 un</option>
                    <option value="500">500 un</option>
                    <option value="1000">1000 un</option>
                    <option value="2000">2000 un</option>
                    <option value="5000">5000 un</option>
                    <option value="Variavel">Variável (Digitar quantidade)</option>
                </select>
            </div>
            <div class="field" id="blocoQtdVariavelEva" style="display: none;">
                <label>Inserir Quantidade Manual *</label>
                <input type="number" id="inputQtdManualEva" min="1" placeholder="Ex: 750">
            </div>
        </div>
    </div>

    <h2>Dados de Atendimento</h2>
    <div class="row">
        <div class="field">
            <label>Nome do Vendedor</label>
            <input type="text" id="nomeVendedor" placeholder="Seu nome (Opcional)">
        </div>
        <div class="field">
            <label>Telefone do Vendedor</label>
            <input type="text" id="telVendedor" placeholder="(00) 00000-0000" oninput="mascaraTelefone(this)" maxlength="15">
        </div>
    </div>

    <button class="btn-principal" onclick="gerarVisualizacaoTela()">Gerar Orçamento</button>

    <div id="bloco-resultado" style="display: none;">
        <div id="area-orcamento">
            <div class="logos-header">
                <div class="logo-box"><img id="img-minha-preview" src="logo-empresa.png" onerror="this.src='https://placehold.co'"></div>
                <div id="preview-numeracao-topo" style="font-size: 14px; font-weight: bold; color: #333;"></div>
            </div>
            <div style="font-size:15px; font-weight:bold; color:#0056b3; margin-bottom:15px; text-transform:uppercase;">Pré-visualização Interna</div>
            <div class="secao-preview"><div class="preview-titulo">Dados do Formulário</div><div id="text-dados-cliente"></div></div>
            <div class="secao-preview"><div class="preview-titulo">Especificações do Pedido</div><div id="text-dados-produto"></div></div>
            <div class="secao-preview"><div class="preview-titulo">Financeiro</div><div id="text-dados-financeiro"></div></div>
            
            <div class="rodape-contato-preview" id="preview-contato-rodape"></div>
        </div>
        <canvas id="canvasEspelho" style="display:none;"></canvas>
        
        <div class="botoes-container">
            <button class="btn-exportar" onclick="abrirImagemNovaAba()">Exportar Orçamento</button>
        </div>
    </div>
</div>

<script>
let database = { 
    produtosConfigurados: [], 
    cordoes: [], 
    quantidades: [], 
    valoresAcabamento: null 
};

// Variável de controle para saber qual aba está sendo processada no orçamento atual
let abaAtivaAtual = "aba-sacolas";
let numeroOrcamentoAtualInstancia = "";

let objImgMinha = new Image();
objImgMinha.src = "logo-empresa.png";
objImgMinha.onerror = function() { objImgMinha.src = "https://placehold.co"; };

function mascaraTelefone(input) {
    let v = input.value.replace(/\D/g, "");
    if (v.length > 11) v = v.substring(0, 11);

    if (v.length > 10) {
        v = v.replace(/^(\d{2})(\d{5})(\d{4})$/, "($1) $2-$3");
    } else if (v.length > 6) {
        v = v.replace(/^(\d{2})(\d{4})(\d{0,4})$/, "($1) $2-$3");
    } else if (v.length > 2) {
        v = v.replace(/^(\d{2})(\d{0,5})$/, "($1) $2");
    } else if (v.length > 0) {
        v = v.replace(/^(\d{0,2})$/, "($1");
    }
    input.value = v;
}

// FUNÇÃO DE TROCA DE ABAS
function alternarAbasDoGerador(event, idAba) {
    document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
    document.querySelectorAll('.aba-btn').forEach(btn => btn.classList.remove('active'));
    
    document.getElementById(idAba).classList.add('active');
    event.target.classList.add('active');
    
    abaAtivaAtual = idAba;
    
    // Reseta a área de resultados anterior ao mudar de produto para evitar confusões
    document.getElementById("bloco-resultado").style.display = "none";
    document.getElementById("area-orcamento").style.display = "none";
}

// CONTROLE DO CAMPO DE QUANTIDADE VARIÁVEL DA NOVA ABA
function verificarQuantidadeVariavelEva(select) {
    const blocoManual = document.getElementById("blocoQtdVariavelEva");
    if(select.value === "Variavel") {
        blocoManual.style.display = "flex";
    } else {
        blocoManual.style.display = "none";
    }
}

const bancoReserva = {
  "produtosConfigurados": [
    { "id": 1, "nomeCompleto": "500 Sacolas 17x18x8 - Offset 180g - sem revestimento", "precoBase": 0.78 },
    { "id": 2, "nomeCompleto": "Sacola Offset 180g - 18x24x8 - Laminação BOPP Fosca", "precoBase": 4.50 }
  ],
  "cordoes": [{ "nome": "Nylon", "preco": 0.20 }, { "nome": "Gorgurão", "preco": 0.80 }],
  "quantidades":,
  "valoresAcabamento": { "ilhos": 0.20, "furoLaco": 0.15, "cores": { "1x0": 480.0, "2x0": 550.0, "4x0": 700.0, "4x1": 850.0 } }
};

window.onload = function() {
    fetch('dados.json?t=' + new Date().getTime())
        .then(response => {
            if (!response.ok) throw new Error("Falha ao abrir o dados.json");
            return response.json();
        })
        .then(data => { 
            database = data; 
            if(database.logoEmpresa && database.logoEmpresa.trim() !== "") {
                objImgMinha.src = database.logoEmpresa;
                document.getElementById('img-minha-preview').src = database.logoEmpresa;
            }
            carregarMenusUnificados(); 
        })
        .catch(err => { 
            console.warn("Utilizando banco reserva integrado.");
            database = JSON.parse(JSON.stringify(bancoReserva));
            carregarMenusUnificados(); 
        });
};

function carregarMenusUnificados() {
    const produtoSel = document.getElementById("selectProdutoConfigurado");
    produtoSel.innerHTML = '';
    if(database.produtosConfigurados) {
        database.produtosConfigurados.forEach((prod) => {
            let opt = document.createElement("option");
            opt.value = prod.id;
            opt.text = prod.nomeCompleto; 
            produtoSel.add(opt);
        });
    }

    const cordaoSel = document.getElementById("selectCordao");
    cordaoSel.innerHTML = '';
    if(database.cordoes) {
        database.cordoes.forEach((c) => {
            let opt = document.createElement("option");
            opt.value = c.nome;
            opt.text = c.nome; 
            cordaoSel.add(opt);
        });
    }

    const qtdSel = document.getElementById("qtd");
    qtdSel.innerHTML = '';
    if(database.quantidades) {
        database.quantidades.forEach((q) => {
            let opt = new Option(q + " un", q);
            qtdSel.add(opt);
        });
    }
}

function formatarMoeda(valor) {
    return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

function calcularValoresAtuais() {
    if (abaAtivaAtual === "aba-sacolas") {
        const idProdutoSelected = parseInt(document.getElementById("selectProdutoConfigurado").value);
        const nomeCordaoSelected = document.getElementById("selectCordao").value;
        const corSelecionada = document.getElementById("selectCores").value;
        const temIlhos = document.getElementById("selectIlhos").value === "Sim";
        const temFuroLaco = document.getElementById("selectFuroLaco").value === "Sim";
        const qtd = parseInt(document.getElementById("qtd").value) || 500;
        
        let produtoEncontrado = database.produtosConfigurados.find(p => p.id === idProdutoSelected);
        let precoProdutoBase = produtoEncontrado ? parseFloat(produtoEncontrado.precoBase || 0) : 0;
        let detalhesBase = produtoEncontrado ? produtoEncontrado.nomeCompleto : 'Nenhum produto';
        
        let cordaoEncontrado = database.cordoes.find(c => c.nome === nomeCordaoSelected);
        let precoCordaoAlca = cordaoEncontrado ? parseFloat(cordaoEncontrado.preco || 0) : 0;
        
        let precoIlhos = 0;
        if (temIlhos && database.valoresAcabamento) {
            precoIlhos = parseFloat(database.valoresAcabamento.ilhos || 0);
        }
        
        let precoFuroLaco = 0;
        if (temFuroLaco && database.valoresAcabamento) {
            precoFuroLaco = parseFloat(database.valoresAcabamento.furoLaco || 0);
        }
        
        let precoCoresFixo = 0;
        if (database.valoresAcabamento && database.valoresAcabamento.cores) {
            precoCoresFixo = parseFloat(database.valoresAcabamento.cores[corSelecionada] || 0);
        }

        let somaInsumosFisicosUnitarios = precoProdutoBase + precoIlhos + precoCordaoAlca + precoFuroLaco;
        let subtotalTiragemFisica = somaInsumosFisicosUnitarios * qtd;
        let custoTotalFinalDoLote = subtotalTiragemFisica + precoCoresFixo;
        
        if (qtd > 2000) {
            let unidadesExcedentes = qtd - 2000;
            let blocksDeMil = Math.ceil(unidadesExcedentes / 1000); 
            custoTotalFinalDoLote += (blocksDeMil * 50.00);
        }
        
        let totalLoteComMargemLucro = custoTotalFinalDoLote * 1.70;
        let precoUnitarioDeVenda = totalLoteComMargemLucro / qtd;
        
        return { 
            custoUnitario: precoUnitarioDeVenda, 
            qtd, 
            total: totalLoteComMargemLucro, 
            detalhesBase, 
            textoEspecificacoes: `<strong>Cores:</strong> ${corSelecionada} | <strong>Ilhós:</strong> ${temIlhos ? 'Sim' : 'Não'}<br><strong>Alça:</strong> ${nomeCordaoSelected} | <strong>Furo Laço:</strong> ${temFuroLaco ? 'Sim' : 'Não'}`
        };
    } else {
        // ESPAÇO RESERVADO PARA OS CÁLCULOS FUTUROS DA MÃO DE EVA
        const modeloEva = document.getElementById("selectModeloEva").value;
        const corEva = document.getElementById("selectCoresMaoEva").value || "Padrão";
        const qtdSelect = document.getElementById("selectQtdEva").value;
        let qtdFinalEva = qtdSelect === "Variavel" ? parseInt(document.getElementById("inputQtdManualEva").value) || 100 : parseInt(qtdSelect);
        
        // Estrutura simbólica provisória aguardando fórmulas
        let valorSimbolicoLote = 500.00; 
        let valorSimbolicoUnitario = valorSimbolicoLote / qtdFinalEva;
        
        return {
            custoUnitario: valorSimbolicoUnitario,
            qtd: qtdFinalEva,
            total: valorSimbolicoLote,
            detalhesBase: `Mão de Torcida em E.V.A - Modelo: ${modeloEva}`,
            textoEspecificacoes: `<strong>Tipo:</strong> Mão de EVA (${modeloEva})<br><strong>Cor do E.V.A:</strong> ${corEva}`
        };
    }
}

function obterNumeroIdentificador() {
    if(numeroOrcamentoAtualInstancia) return numeroOrcamentoAtualInstancia;
    const d = new Date();
    numeroOrcamentoAtualInstancia = d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0') + String(d.getMilliseconds()).substring(0,2);
    return numeroOrcamentoAtualInstancia;
}

function gerarVisualizacaoTela() {
    const nome = document.getElementById("nomeCliente").value.trim();
    const tel = document.getElementById("telCliente").value.trim();
    if(!nome || !tel) { alert("Erro: Nome e Telefone do cliente são obrigatórios!"); return; }
    
    const dadosComerciais = calcularValoresAtuais();
    const telVendedor = document.getElementById("telVendedor").value.trim();

    const numeroFinal = obterNumeroIdentificador();
    document.getElementById("preview-numeracao-topo").innerText = "Nº " + numeroFinal;

    document.getElementById("text-dados-cliente").innerHTML = `<strong>Nome:</strong> ${nome} <br> <strong>Telefone:</strong> ${tel}`;
    document.getElementById("text-dados-produto").innerHTML = `<strong>Base:</strong> ${dadosComerciais.detalhesBase}<br>${dadosComerciais.textoEspecificacoes}`;
    document.getElementById("text-dados-financeiro").innerHTML = `<strong>Quantidade:</strong> ${dadosComerciais.qtd} un | <strong>Unitário de Venda:</strong> ${formatarMoeda(dadosComerciais.custoUnitario)} <br> <strong>Total do Lote: ${formatarMoeda(dadosComerciais.total)}</strong>`;
    
    let textoContatoVendedor = telVendedor ? ` | 📞 Vendedor: ${telVendedor}` : '';
    document.getElementById("preview-contato-rodape").innerHTML = `<strong>COMVIL BRINDES</strong><br>CNPJ: 36.206.286/0001-03 | ✉️ comvil@comvil.com.br<br>☎️ Fixo: 11 3461-0813 | 📱 WhatsApp: 11 97024-3064${textoContatoVendedor}`;

    document.getElementById("area-orcamento").style.display = "block";
    document.getElementById("bloco-resultado").style.display = "block";
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
    let words = text.split(' ');
    let line = '';
    let currentY = y;

    for (let n = 0; n < words.length; n++) {
        let testLine = line + words[n] + ' ';
        let metrics = ctx.measureText(testLine);
        let testWidth = metrics.width;
        if (testWidth > maxWidth && n > 0) {
            ctx.fillText(line, x, currentY);
            line = words[n] + ' ';
            currentY += lineHeight;
        } else {
            line = testLine;
        }
    }
    ctx.fillText(line, x, currentY);
    return currentY + lineHeight;
}

function abrirImagemNovaAba() {
    const nome = document.getElementById("nomeCliente").value.trim();
    const telFormulario = document.getElementById("telCliente").value.trim();
    const vendedor = document.getElementById("nomeVendedor").value.trim();
    const telVendedor = document.getElementById("telVendedor").value.trim();
    const dadosComerciais = calcularValoresAtuais();
    const dataHoje = new Date();
    const dataValidade = new Date();
    dataValidade.setDate(dataHoje.getDate() + 10);
    const canvas = document.getElementById("canvasEspelho");
    const ctx = canvas.getContext("2d");
    
    canvas.width = 600; canvas.height = 860;
    ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    try {
        let maxAlturaLogo = 50;
        let larguraOriginal = objImgMinha.naturalWidth || objImgMinha.width || 150;
        let alturaOriginal = objImgMinha.naturalHeight || objImgMinha.height || 55;
        let proporcaoLogo = larguraOriginal / alturaOriginal; 
        let larguraCalculada = maxAlturaLogo * proporcaoLogo; 
        if(larguraCalculada > 220) { larguraCalculada = 220; maxAlturaLogo = larguraCalculada / proporcaoLogo; }
        ctx.drawImage(objImgMinha, 35, 30, larguraCalculada, maxAlturaLogo); 
    } catch(e){}

    const numeroFinal = obterNumeroIdentificador();
    ctx.fillStyle = "#333333";
    ctx.font = "bold 14px Arial";
    ctx.textAlign = "right";
    ctx.fillText("ORÇAMENTO Nº " + numeroFinal, 565, 60);

    ctx.textAlign = "left";
    ctx.strokeStyle = "#0056b3"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(35, 95); ctx.lineTo(565, 95); ctx.stroke();
    ctx.fillStyle = "#0056b3"; ctx.font = "bold 15px Arial"; ctx.fillText("PROPOSTA COMERCIAL DE EMBALAGENS", 35, 130);
    desenharCaixaPdf(ctx, 35, 150, 530, 65, "Dados do Cliente");
    ctx.fillStyle = "#333333"; ctx.font = "12px Arial";
    ctx.fillText("Nome / Razão Social: " + nome, 50, 185); ctx.fillText("Telefone: " + telFormulario, 50, 203);
    desenharCaixaPdf(ctx, 35, 235, 530, 105, "Especificações Técnicas do Pedido");
    ctx.fillStyle = "#333333"; ctx.font = "bold 11px Arial"; ctx.fillText("Modelo base de fábrica:", 50, 270); ctx.font = "11px Arial";
    
    let detalhesTexto = dadosComerciais.detalhesBase;
    let partes = detalhesTexto.split(" | ");
    ctx.fillText("• " + partes.slice(0, 4).join(" | "), 50, 290);
    if(partes.length > 4) ctx.fillText("• " + partes.slice(4).join(" | "), 50, 306);
