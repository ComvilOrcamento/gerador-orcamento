<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Orçamentos Profissional</title>
    
    <!-- Bibliotecas para Geração de PDF Perfeita -->
    <script src="https://cloudflare.com"></script>
    
    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        body { background-color: #f4f4f6; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 600px; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { font-size: 24px; margin-bottom: 20px; color: #000; }
        h2 { font-size: 14px; margin: 15px 0 10px 0; color: #333; font-weight: bold; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        .row { display: flex; gap: 15px; margin-bottom: 12px; }
        .field { flex: 1; display: flex; flex-direction: column; }
        label { font-size: 11px; margin-bottom: 4px; color: #555; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 13px; outline: none; background: #fff; }
        input:focus, select:focus { border-color: #ba1cb3; }
        
        .btn-principal { width: 100%; background: #ba1cb3; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: bold; margin: 15px 0; }
        .btn-principal:hover { background: #9e1497; }
        .btn-exportar { background: #00bcd4; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 13px; cursor: pointer; float: right; margin-top: 10px; font-weight: bold; }
        .btn-exportar:hover { background: #0097a7; }
        
        /* ESTILO DA FOLHA DO ORÇAMENTO (FORMATADA PARA PDF A4) */
        #area-orcamento { 
            background: #ffffff; 
            padding: 40px; 
            margin-top: 15px; 
            display: none;
            color: #333;
        }
        .logos-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #ba1cb3; padding-bottom: 15px; }
        .logo-box { flex: 1; }
        .logo-box img { max-height: 65px; max-width: 180px; object-fit: contain; }
        .recibo-titulo { font-size: 18px; font-weight: bold; color: #ba1cb3; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 0.5px; }
        
        /* SEÇÕES DO PDF */
        .secao-pdf { margin-bottom: 20px; background: #fafafa; padding: 15px; border-radius: 6px; border-left: 4px solid #ba1cb3; }
        .secao-titulo { font-size: 11px; font-weight: bold; text-transform: uppercase; color: #777; margin-bottom: 8px; }
        .recibo-linha { font-size: 13px; margin-bottom: 6px; line-height: 1.5; color: #444; }
        
        /* TABELA DE PREÇOS NO PDF */
        .tabela-itens { width: 100%; border-collapse: collapse; margin-top: 15px; margin-bottom: 15px; }
        .tabela-itens th { background: #ba1cb3; color: white; font-size: 12px; padding: 8px; text-align: left; font-weight: bold; }
        .tabela-itens td { padding: 10px 8px; border-bottom: 1px solid #eee; font-size: 13px; }
        .recibo-total { font-size: 18px; font-weight: bold; color: #ba1cb3; text-align: right; margin-top: 15px; padding-top: 10px; }

        /* VISUALIZAÇÃO DA SACOLA 3D ILUSTRATIVA */
        .preview-sacola-container { display: flex; justify-content: center; margin: 15px 0; padding: 10px; background: #fff; }
        .sacola-virtual { 
            background: #e8e8e8; 
            border: 1px solid #b5b5b5; 
            box-shadow: -8px 8px 15px rgba(0,0,0,0.15), inset 15px 0 20px rgba(0,0,0,0.05);
            position: relative; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            transform: perspective(500px) rotateY(-12deg);
            transform-style: preserve-3d;
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        /* Lateral 3d dobrada */
        .sacola-virtual::before {
            content: ''; position: absolute; top: 0; right: -10px; width: 10px; height: 100%;
            background: #d8d8d8; transform: skewY(12deg); transform-origin: left;
            border: 1px solid #b5b5b5; border-left: none;
        }
        .alca-virtual {
            width: 35px; height: 25px;
            border: 3px solid #666; border-bottom: none;
            border-radius: 30px 30px 0 0;
            position: absolute; top: -26px; left: 50%; transform: translateX(-50%);
        }
        .logo-sacola-virtual { max-width: 55%; max-height: 45%; object-fit: contain; filter: drop-shadow(1px 2px 3px rgba(0,0,0,0.15)); }
        .dimensao-label { position: absolute; bottom: 6px; font-size: 9px; color: #777; font-weight: bold; background: rgba(255,255,255,0.7); padding: 2px 6px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Novo Orçamento</h1>

    <!-- LOGO DO CLIENTE (OPCIONAL) -->
    <h2>Arte do Cliente</h2>
    <div class="field" style="margin-bottom: 12px;">
        <label>Logo do Cliente (Opcional - Para a estampa da sacola)</label>
        <input type="file" id="uploadLogoCliente" accept="image/*" onchange="carregarLogoCliente(event)">
    </div>

    <!-- DADOS DO CLIENTE -->
    <h2>Dados do cliente</h2>
    <div class="field" style="margin-bottom: 12px;">
        <label>Buscar Cliente Cadastrado</label>
        <select id="selectCliente" onchange="selecionarCliente()">
            <option value="">-- Selecione um cliente ou digite abaixo --</option>
        </select>
    </div>
    <div class="field" style="margin-bottom: 12px;">
        <label>Nome *</label>
        <input type="text" id="nomeCliente" placeholder="Nome completo do cliente" required>
    </div>
    <div class="row">
        <div class="field">
            <label>E-mail</label>
            <input type="email" id="emailCliente" placeholder="email@exemplo.com">
        </div>
        <div class="field">
            <label>Telefone</label>
            <input type="text" id="telCliente" placeholder="(00) 00000-0000">
        </div>
    </div>

    <!-- ITENS -->
    <h2>Itens do orçamento</h2>
    <div class="row">
        <div class="field">
            <label>Produto</label>
            <select id="produto"></select>
        </div>
        <div class="field">
            <label>Tipo - Tamanho</label>
            <select id="tamanho"></select>
        </div>
    </div>
    <div class="row">
        <div class="field">
            <label>Papel</label>
            <select id="papel"></select>
        </div>
        <div class="field">
            <label>Gramatura</label>
            <select id="gramatura">
                <option value="180g">180g</option>
                <option value="240g">240g</option>
            </select>
        </div>
    </div>
    <div class="row">
        <div class="field">
            <label>Cores</label>
            <select id="cores">
                <option value="2x0">2x0</option>
                <option value="4x0">4x0</option>
            </select>
        </div>
        <div class="field">
            <label>Cordão</label>
            <select id="cordao"></select>
        </div>
    </div>

    <!-- ACABAMENTOS -->
    <h2>Ennobrecimento</h2>
    <div class="row">
        <div class="field"><label>Plastificação</label><select id="plastificacao"><option value="Não">Não</option><option value="Sim">Sim</option></select></div>
        <div class="field"><label>Laminação BOPP</label><select id="laminacao"><option value="Não">Não</option><option value="Sim">Sim</option></select></div>
    </div>
    <div class="row">
        <div class="field"><label>Ilhós</label><select id="ilhos"><option value="Não">Não</option><option value="Sim">Sim</option></select></div>
        <div class="field"><label>Verniz Local</label><select id="verniz"><option value="Não">Não</option><option value="Sim">Sim</option></select></div>
    </div>
    <div class="row">
        <div class="field"><label>Hot Stamping</label><select id="hotstamping"><option value="Não">Não</option><option value="Sim">Sim</option></select></div>
        <div class="field"><label>Gofragem</label><select id="gofragem"><option value="Não">Não</option><option value="Casca de ovo">Casca de ovo</option></select></div>
    </div>
    <div class="row">
        <div class="field"><label>Furo Laço</label><select id="furo"><option value="Não">Não</option><option value="2x0">2x0</option></select></div>
        <div class="field"><label>Quantidade Mínima</label><select id="qtd"><option value="500">500 un</option><option value="1000">1000 un</option></select></div>
    </div>

    <h2>Vendedor</h2>
    <div class="field">
        <label>Nome do vendedor</label>
        <input type="text" id="nomeVendedor" placeholder="Seu nome">
    </div>

    <button class="btn-principal" onclick="calcularOrcamento()">Gerar Orçamento</button>

    <!-- SAÍDA EM PDF -->
    <div id="bloco-resultado" style="display: none;">
        <h2>Visualização da Proposta</h2>
        <div id="area-orcamento">
            <!-- Renderizado via JS -->
        </div>
        <button class="btn-exportar" onclick="exportarPdf()">Baixar Orçamento em PDF</button>
    </div>
</div>

<script>
let bancoDados = {};
let logoClienteBase64 = "";

function carregarLogoCliente(event) {
    const arquivo = event.target.files[0];
    if (arquivo) {
        const reader = new FileReader();
        reader.onload = function(e) {
            logoClienteBase64 = e.target.result;
        };
        reader.readAsDataURL(arquivo);
    }
}

window.onload = function() {
    fetch('dados.json')
        .then(response => response.json())
        .then(data => {
            bancoDados = data;
            carregarMenus();
        })
        .catch(error => console.error("Erro ao carregar banco de dados:", error));
};

function carregarMenus() {
    const clienteSel = document.getElementById("selectCliente");
    bancoDados.clientes.forEach((c, index) => {
        clienteSel.options[clienteSel.options.length] = new Option(c.nome, index);
    });
    const prodSel = document.getElementById("produto");
    bancoDados.produtos.forEach(p => prodSel.options[prodSel.options.length] = new Option(p.nome, p.nome));
    const tamSel = document.getElementById("tamanho");
    bancoDados.tamanhos.forEach(t => {
        let opt = new Option(t.nome, t.nome);
        opt.dataset.preco = t.preco;
        tamSel.add(opt);
    });
    const papelSel = document.getElementById("papel");
    bancoDados.papeis.forEach(p => {
        let opt = new Option(p.nome, p.nome);
        opt.dataset.preco = p.preco;
        papelSel.add(opt);
    });
    const cordaoSel = document.getElementById("cordao");
    bancoDados.cordoes.forEach(c => {
        let opt = new Option(c.nome, c.nome);
        opt.dataset.preco = c.preco;
        cordaoSel.add(opt);
    });
}

function selecionarCliente() {
    const idx = document.getElementById("selectCliente").value;
    if(idx !== "") {
        const cliente = bancoDados.clientes[idx];
        document.getElementById("nomeCliente").value = cliente.nome;
        document.getElementById("emailCliente").value = cliente.email;
        document.getElementById("telCliente").value = cliente.telefone;
    }
}

function calcularOrcamento() {
    const tamSelect = document.getElementById("tamanho");
    const papelSelect = document.getElementById("papel");
    const cordaoSelect = document.getElementById("cordao");
    
    let custoUnitario = 0;
    custoUnitario += parseFloat(tamSelect.options[tamSelect.selectedIndex].dataset.preco || 0);
    custoUnitario += parseFloat(papelSelect.options[papelSelect.selectedIndex].dataset.preco || 0);
    custoUnitario += parseFloat(cordaoSelect.options[cordaoSelect.selectedIndex].dataset.preco || 0);
    
    const tabelaAcabamentos = bancoDados.valoresAcabamento;
    let acabamentosAtivos = [];
    if(document.getElementById("plastificacao").value === "Sim") { custoUnitario += tabelaAcabamentos.plastificacao; acabamentosAtivos.push("Plastificação"); }
    if(document.getElementById("laminacao").value === "Sim") { custoUnitario += tabelaAcabamentos.laminacao; acabamentosAtivos.push("Laminação BOPP"); }
    if(document.getElementById("ilhos").value === "Sim") { custoUnitario += tabelaAcabamentos.ilhos; acabamentosAtivos.push("Ilhós"); }
    if(document.getElementById("verniz").value === "Sim") { custoUnitario += tabelaAcabamentos.verniz; acabamentosAtivos.push("Verniz Local"); }
    if(document.getElementById("hotstamping").value === "Sim") { custoUnitario += tabelaAcabamentos.hotstamping; acabamentosAtivos.push("Hot Stamping"); }
    if(document.getElementById("gofragem").value !== "Não") { custoUnitario += tabelaAcabamentos.gofragem; acabamentosAtivos.push("Gofragem"); }

    const qtd = parseInt(document.getElementById("qtd").value);
    const valorTotal = custoUnitario * qtd;

    // Regra de proporção para a Sacola Ilustrativa 3D Realista
    let w = 110, h = 140;
    if(tamSelect.value === "25x35x10") { w = 135; h = 175; }
    if(tamSelect.value === "30x40x12") { w = 160; h = 195; }

    // Sua logo fixa puxa direto do repositório
    let imgMinhaTag = `<img src="logo-empresa.png" onerror="this.src='https://placehold.co'">`;
    
    // Logo do cliente só aparece se ele fizer o upload (opcional)
    let imgClienteTag = logoClienteBase64 ? `<img src="${logoClienteBase64}">` : '<span style="font-size:11px;color:#aaa">Arte Sem Estampa</span>';
    let imgSacolaTag = logoClienteBase64 ? `<img class="logo-sacola-virtual" src="${logoClienteBase64}">` : '<span style="font-size:10px;color:#999;font-weight:bold;letter-spacing:1px;text-transform:uppercase">Sua Marca</span>';

    let htmlOrcamento = `
        <div class="logos-header">
            <div class="logo-box">${imgMinhaTag}</div>
            <div class="logo-box" style="text-align:right;">${imgClienteTag}</div>
        </div>
        
        <div class="recibo-titulo">Orçamento Comercial</div>
        
        <div class="secao-pdf">
            <div class="secao-titulo">Dados do Cliente</div>
            <div class="recibo-linha"><strong>Nome/Razão Social:</strong> ${document.getElementById("nomeCliente").value || 'Não informado'}</div>
            <div class="recibo-linha"><strong>Telefone:</strong> ${document.getElementById("telCliente").value || 'Não informado'} | <strong>E-mail:</strong> ${document.getElementById("emailCliente").value || 'Não informado'}</div>
        </div>

        <div class="secao-pdf">
            <div class="secao-titulo">Visualização Conceitual do Produto (Perspectiva 3D)</div>
            <div class="preview-sacola-container">
                <div class="sacola-virtual" style="width: ${w}px; height: ${h}px;">
                    <div class="alca-virtual"></div>
                    ${imgSacolaTag}
                    <div class="dimensao-label">${tamSelect.value}</div>
                </div>
            </div>
        </div>

        <div class="secao-pdf">
            <div class="secao-titulo">Especificações Técnicas</div>
            <table class="tabela-itens">
                <thead>
                    <tr>
                        <th>Produto / Tamanho</th>
                        <th>Papel / Gramatura</th>
                        <th>Cores</th>
                        <th>Cordão e Acabamentos</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>${document.getElementById("produto").value} (${tamSelect.value})</td>
                        <td>${papelSelect.value} - ${document.getElementById("gramatura").value}</td>
                        <td>${document.getElementById("cores").value}</td>
                        <td>${cordaoSelect.value}${acabamentosAtivos.length > 0 ? ' + ' + acabamentosAtivos.join(", ") : " (Sem Adicionais)"}</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="secao-pdf">
            <div class="secao-titulo">Valores e Condições</div>
            <div class="recibo-linha"><strong>Quantidade Solicitada:</strong> ${qtd} unidades</div>
            <div class="recibo-linha"><strong>Valor Unitário:</strong> R$ ${custoUnitario.toFixed(2)}</div>
            <div class="recibo-total">VALOR TOTAL DA PROPOSTA: R$ ${valorTotal.toFixed(2)}</div>
        </div>

        <div class="recibo-linha" style="margin-top: 30px; font-size: 11px; color: #777; text-align: center; border-top: 1px dashed #ccc; padding-top: 15px;">
            Proposta gerada por: ${document.getElementById("nomeVendedor").value || 'Departamento Comercial'} em ${new Date().toLocaleDateString('pt-BR')}
        </div>
    `;

    document.getElementById("area-orcamento").innerHTML = htmlOrcamento;
    document.getElementById("area-orcamento").style.display = "block";
    document.getElementById("bloco-resultado").style.display = "block";
}

function exportarPdf() {
    const elemento = document.getElementById("area-orcamento");
    const nomeCliente = document.getElementById("nomeCliente").value || 'Cliente';
    
    // Configurações de página A4 perfeitas para impressão
    const opcoes = {
        margin:       10,
        filename:     `Orcamento_${nomeCliente}.pdf`,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2, useCORS: true },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };
    
    // Executa a exportação nativa em PDF
    html2pdf().set(opcoes).from(elemento).save();
}
</script>
</body>
</html>
