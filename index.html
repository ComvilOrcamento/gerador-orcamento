<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Orçamentos Comercial</title>
    
    <!-- BIBLIOTECA MODERNA PARA CONVERTER HTML EM IMAGEM JPG IMEDIATAMENTE -->
    <script src="https://cloudflare.com"></script>
    
    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        body { background-color: #f4f4f6; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 600px; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { font-size: 24px; margin-bottom: 20px; color: #000; }
        h2 { font-size: 14px; margin: 15px 0 10px 0; color: #333; font-weight: bold; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        .row { display: flex; gap: 15px; margin-bottom: 12px; }
        .field { flex: 1; display: flex; flex-direction: column; }
        label { font-size: 11px; margin-bottom: 4px; color: #555; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 13px; outline: none; background: #fff; }
        input:focus, select:focus { border-color: #ba1cb3; }
        
        .btn-principal { width: 100%; background: #ba1cb3; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: bold; margin: 15px 0; }
        .btn-principal:hover { background: #9e1497; }
        .btn-exportar { background: #00bcd4; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; float: right; margin-top: 15px; font-weight: bold; width: 100%; }
        .btn-exportar:hover { background: #0097a7; }
        
        /* ESTILO DA FOLHA DO ORÇAMENTO */
        #area-orcamento { background: #ffffff; padding: 30px; margin-top: 15px; display: none; color: #333; width: 100%; max-width: 540px; }
        .logos-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #ba1cb3; padding-bottom: 15px; gap: 15px; }
        .logo-box { flex: 1; display: flex; align-items: center; }
        .logo-box img { max-height: 55px; max-width: 150px; object-fit: contain; display: block; }
        .cliente-box { justify-content: flex-end; gap: 8px; font-size: 12px; font-weight: bold; color: #555; }
        .secao-pdf { margin-bottom: 15px; background: #fafafa; padding: 12px; border-radius: 6px; border-left: 3px solid #ba1cb3; }
        .secao-titulo { font-size: 10px; font-weight: bold; text-transform: uppercase; color: #777; margin-bottom: 5px; }
        .recibo-linha { font-size: 12px; margin-bottom: 4px; line-height: 1.4; color: #444; }
        
        /* TABELA */
        .tabela-itens { width: 100%; border-collapse: collapse; margin: 10px 0; }
        .tabela-itens th { background: #ba1cb3; color: white; font-size: 11px; padding: 6px; text-align: left; }
        .tabela-itens td { padding: 8px 6px; border-bottom: 1px solid #eee; font-size: 12px; }
        .recibo-total { font-size: 16px; font-weight: bold; color: #ba1cb3; text-align: right; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Novo Orçamento</h1>

    <!-- LOGO DO CLIENTE (OPCIONAL) -->
    <h2>Arte do Cliente</h2>
    <div class="field" style="margin-bottom: 12px;">
        <label>Logo do Cliente (PNG ou JPG)</label>
        <input type="file" id="uploadLogoCliente" accept="image/*" onchange="carregarLogoCliente(event)">
    </div>

    <!-- DADOS DO CLIENTE -->
    <h2>Dados do cliente</h2>
    <div class="field" style="margin-bottom: 12px;">
        <label>Buscar Cliente Cadastrado</label>
        <select id="selectCliente" onchange="selecionarCliente()">
            <option value="">-- Selecione um cliente --</option>
        </select>
    </div>
    <div class="field" style="margin-bottom: 12px;">
        <label>Nome *</label>
        <input type="text" id="nomeCliente" placeholder="Nome do cliente ou Empresa" required>
    </div>
    <div class="row">
        <div class="field"><label>E-mail</label><input type="email" id="emailCliente"></div>
        <div class="field"><label>Telefone</label><input type="text" id="telCliente"></div>
    </div>

    <!-- ITENS -->
    <h2>Itens do orçamento</h2>
    <div class="row">
        <div class="field"><label>Produto</label><select id="produto"></select></div>
        <div class="field"><label>Tipo - Tamanho</label><select id="tamanho"></select></div>
    </div>
    <div class="row">
        <div class="field"><label>Papel</label><select id="papel"></select></div>
        <div class="field"><label>Gramatura</label><select id="gramatura"><option value="180g">180g</option><option value="240g">240g</option></select></div>
    </div>
    <div class="row">
        <div class="field"><label>Cores</label><select id="cores"><option value="2x0">2x0</option><option value="4x0">4x0</option></select></div>
        <div class="field"><label>Cordão</label><select id="cordao"></select></div>
    </div>

    <!-- ACABAMENTOS -->
    <h2>Ennobrecimento</h2>
    <div class="row">
        <div class="field"><label>Plastificação</label><select id="plastificacao"><option value="Não">Não</option><option value="Sim">Sim</option></select></div>
        <div class="field"><label>Laminação BOPP</label><select id="laminacao"><option value="Não">Não</option><option value="Sim">Sim</option></select></div>
    </div>
    <div class="row">
        <div class="field"><label>Ilhós</label><select id="ilhos"><option value="Não">Não</option><option value="Sim">Sim</option></select></div>
        <div class="field"><label>Verniz Local</label><select id="verniz"><option value="Não">Não</option><option value="Sim">Sim</option></select></div>
    </div>
    <div class="row">
        <div class="field"><label>Hot Stamping</label><select id="hotstamping"><option value="Não">Não</option><option value="Sim">Sim</option></select></div>
        <div class="field"><label>Quantidade</label><select id="qtd"><option value="500">500 un</option><option value="1000">1000 un</option></select></div>
    </div>

    <div class="field">
        <label>Nome do vendedor</label>
        <input type="text" id="nomeVendedor" placeholder="Seu nome">
    </div>

    <button class="btn-principal" onclick="gerarPropostaCompleta()">Gerar Orçamento</button>

    <!-- ÁREA DE PREVIEW E EXPORTAÇÃO DIRETA -->
    <div id="bloco-resultado" style="display: none;">
        <div id="area-orcamento">
            <!-- Renderizado dinamicamente -->
        </div>
        <button class="btn-exportar" onclick="exportarJpgDireto()">Exportar Orçamento em JPG</button>
    </div>
</div>

<script>
let bancoDados = { clientes: [], produtos: [], tamanhos: [], papeis: [], cordoes: [], valoresAcabamento: {} };
let logoClienteBase64 = "";

function carregarLogoCliente(event) {
    const arquivo = event.target.files;
    if (arquivo) {
        const reader = new FileReader();
        reader.onload = function(e) { logoClienteBase64 = e.target.result; };
        reader.readAsDataURL(arquivo);
    }
}

window.onload = function() {
    fetch('dados.json')
        .then(response => response.json())
        .then(data => {
            bancoDados = data;
            const clientesLocais = JSON.parse(localStorage.getItem('clientesSalvosAutomático')) || [];
            bancoDados.clientes = [...bancoDados.clientes, ...clientesLocais];
            carregarMenus();
        })
        .catch(error => console.error("Erro ao carregar banco de dados:", error));
};

function carregarMenus() {
    const clienteSel = document.getElementById("selectCliente");
    clienteSel.innerHTML = '<option value="">-- Selecione um cliente --</option>';
    bancoDados.clientes.forEach((c, index) => { clienteSel.options[clienteSel.options.length] = new Option(c.nome, index); });
    const prodSel = document.getElementById("produto");
    prodSel.innerHTML = '';
    bancoDados.produtos.forEach(p => prodSel.options[prodSel.options.length] = new Option(p.nome, p.nome));
    const tamSel = document.getElementById("tamanho");
    tamSel.innerHTML = '';
    bancoDados.tamanhos.forEach(t => { let opt = new Option(t.nome, t.nome); opt.dataset.preco = t.preco; tamSel.add(opt); });
    const papelSel = document.getElementById("papel");
    papelSel.innerHTML = '';
    bancoDados.papeis.forEach(p => { let opt = new Option(p.nome, p.nome); opt.dataset.preco = p.preco; papelSel.add(opt); });
    const cordaoSel = document.getElementById("cordao");
    cordaoSel.innerHTML = '';
    bancoDados.cordoes.forEach(c => { let opt = new Option(c.nome, c.nome); opt.dataset.preco = c.preco; cordaoSel.add(opt); });
}

function selecionarCliente() {
    const idx = document.getElementById("selectCliente").value;
    if(idx !== "") {
        const cliente = bancoDados.clientes[idx];
        document.getElementById("nomeCliente").value = cliente.nome;
        document.getElementById("emailCliente").value = cliente.email;
        document.getElementById("telCliente").value = cliente.telephone || cliente.telefone || '';
    }
}

function salvarClienteAutomatico(nome, email, telefone) {
    if (!nome) return;
    const jaExiste = bancoDados.clientes.some(c => c.nome.toLowerCase() === nome.toLowerCase());
    if (!jaExiste) {
        const novoCliente = { nome, email, telephone: telephone };
        let historicoLocal = JSON.parse(localStorage.getItem('clientesSalvosAutomático')) || [];
        historicoLocal.push(novoCliente);
        localStorage.setItem('clientesSalvosAutomático', JSON.stringify(historicoLocal));
        bancoDados.clientes.push(novoCliente);
        carregarMenus();
    }
}

function gerarPropostaCompleta() {
    const nome = document.getElementById("nomeCliente").value;
    const email = document.getElementById("emailCliente").value;
    const tel = document.getElementById("telCliente").value;
    
    if(!nome) { alert("Por favor, digite o nome do cliente."); return; }
    salvarClienteAutomatico(nome, email, tel);
    
    const tamSelect = document.getElementById("tamanho");
    const papelSelect = document.getElementById("papel");
    const cordaoSelect = document.getElementById("cordao");
    
    let custoUnitario = 0;
    custoUnitario += parseFloat(tamSelect.options[tamSelect.selectedIndex].dataset.preco || 0);
    custoUnitario += parseFloat(papelSelect.options[papelSelect.selectedIndex].dataset.preco || 0);
    custoUnitario += parseFloat(cordaoSelect.options[cordaoSelect.selectedIndex].dataset.preco || 0);
    
    const tabelaAcabamentos = bancoDados.valoresAcabamento;
    let acabamentosAtivos = [];
    if(document.getElementById("plastificacao").value === "Sim") { custoUnitario += tabelaAcabamentos.plastificacao; acabamentosAtivos.push("Plastificação"); }
    if(document.getElementById("laminacao").value === "Sim") { custoUnitario += tabelaAcabamentos.laminacao; acabamentosAtivos.push("Laminação BOPP"); }
    if(document.getElementById("ilhos").value === "Sim") { custoUnitario += tabelaAcabamentos.ilhos; acabamentosAtivos.push("Ilhós"); }
    if(document.getElementById("verniz").value === "Sim") { custoUnitario += tabelaAcabamentos.verniz; acabamentosAtivos.push("Verniz Local"); }
    if(document.getElementById("hotstamping").value === "Sim") { custoUnitario += tabelaAcabamentos.hotstamping; acabamentosAtivos.push("Hot Stamping"); }

    const qtd = parseInt(document.getElementById("qtd").value);
    const valorTotal = custoUnitario * qtd;

    const dataHoje = new Date();
    const dataValidade = new Date();
    dataValidade.setDate(dataHoje.getDate() + 10);

    let imgMinhaTag = `<img src="logo-empresa.png" onerror="this.src='https://placehold.co'">`;
    let imgClienteTag = logoClienteBase64 ? `<span>Cliente:</span><img src="${logoClienteBase64}">` : '<span>Cliente: [Sem Logo Anexa]</span>';

    let htmlOrcamento = `
        <div class="logos-header">
            <div class="logo-box">${imgMinhaTag}</div>
            <div class="logo-box cliente-box">${imgClienteTag}</div>
        </div>
        
        <div style="font-size: 15px; font-weight: bold; color: #ba1cb3; margin-bottom: 15px; text-transform: uppercase;">Proposta Comercial</div>
        
        <div class="secao-pdf">
            <div class="secao-titulo">Dados do Cliente</div>
            <div class="recibo-linha"><strong>Nome / Razão Social:</strong> ${nome}</div>
            <div class="recibo-linha"><strong>Telefone:</strong> ${tel || 'Não informado'} | <strong>E-mail:</strong> ${email || 'Não informado'}</div>
        </div>

        <div class="secao-pdf">
            <div class="secao-titulo">Especificações do Pedido</div>
            <table class="tabela-itens">
                <thead><tr><th>Item</th><th>Papel</th><th>Cores</th><th>Acabamentos</th></tr></thead>
                <tbody><tr>
                    <td>${document.getElementById("produto").value} (${tamSelect.value})</td>
                    <td>${papelSelect.value} - ${document.getElementById("gramatura").value}</td>
                    <td>${document.getElementById("cores").value}</td>
                    <td>${cordaoSelect.value} ${acabamentosAtivos.length > 0 ? '+ ' + acabamentosAtivos.join(", ") : ""}</td>
                </tr></tbody>
            </table>
        </div>

        <div class="secao-pdf">
            <div class="secao-titulo">Resumo Financeiro</div>
            <div class="recibo-linha"><strong>Quantidade:</strong> ${qtd} unidades | <strong>Valor Unitário:</strong> R$ ${custoUnitario.toFixed(2)}</div>
            <div class="recibo-total">TOTAL DA PROPOSTA: R$ ${valorTotal.toFixed(2)}</div>
        </div>
        
        <div class="secao-pdf" style="background:#fff2fd; border-left:3px solid #ba1cb3; padding:10px;">
            <div class="recibo-linha" style="color:#ba1cb3; font-weight:bold; font-size:11px;">⚠️ CONDIÇÕES COMERCIAIS</div>
            <div class="recibo-linha" style="font-size:11px;">• <strong>Validade da Proposta:</strong> Válido por 10 dias (expira obrigatoriamente em: <strong>${dataValidade.toLocaleDateString('pt-BR')}</strong>).</div>
            <div class="recibo-linha" style="font-size:11px; margin-top:4px;">• <strong>Forma de Pagamento:</strong> 50% de entrada na aprovação do pedido e 50% restante para 21 dias após a entrega.</div>
            <div class="recibo-linha" style="font-size:11px; margin-top:4px;">• <strong>Prazo de Produção:</strong> 20 dias úteis a partir da aprovação final do layout digital e pagamento da entrada.</div>
        </div>
        
        <div class="recibo-linha" style="margin-top: 20px; font-size: 10px; color: #777; text-align: center; border-top: 1px dashed #ccc; padding-top: 10px;">
            Emitido por: ${document.getElementById("nomeVendedor").value || 'Comercial'} em ${dataHoje.toLocaleDateString('pt-BR')}
        </div>
    `;

    document.getElementById("area-orcamento").innerHTML = htmlOrcamento;
    document.getElementById("area-orcamento").style.display = "block";
    document.getElementById("bloco-resultado").style.display = "block";
}

function exportarJpgDireto() {
    const alvo = document.getElementById("area-orcamento");
    const nomeCliente = document.getElementById("nomeCliente").value || 'Cliente';
    
    // Transforma o HTML diretamente em uma imagem digital JPG limpa
    htmlToImage.toJpeg(alvo, { quality: 0.95, bgcolor: '#ffffff' })
        .then(function (dataUrl) {
            const link = document.createElement('a');
            link.download = `Orcamento_${nomeCliente}.jpg`;
            link.href = dataUrl;
            link.click();
        })
        .catch(function (error) {
            alert('Houve um problema ao salvar a imagem automaticamente. Tente novamente.');
            console.error('Erro de conversão:', error);
        });
}
</script>
</body>
</html>
