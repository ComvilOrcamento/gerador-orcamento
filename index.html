<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Orçamento Automatizado</title>
    <!-- Biblioteca para transformar HTML em Imagem -->
    <script src="https://cloudflare.com"></script>
    
    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        body { background-color: #f4f4f6; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 600px; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { font-size: 24px; margin-bottom: 20px; color: #000; }
        h2 { font-size: 14px; margin: 15px 0 10px 0; color: #333; font-weight: bold; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        .row { display: flex; gap: 15px; margin-bottom: 12px; }
        .field { flex: 1; display: flex; flex-direction: column; }
        label { font-size: 11px; margin-bottom: 4px; color: #555; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 13px; outline: none; background: #fff; }
        input:focus, select:focus { border-color: #ba1cb3; }
        .btn-principal { width: 100%; background: #ba1cb3; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: bold; margin: 15px 0; }
        .btn-principal:hover { background: #9e1497; }
        .btn-exportar { background: #ba1cb3; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 13px; cursor: pointer; float: right; margin-top: 10px; font-weight: bold; }
        .btn-exportar:hover { background: #9e1497; }
        
        /* ESTILO DO RECIBO DE ORÇAMENTO (IMAGEM) */
        #area-orcamento { 
            background: #ffffff; 
            border: 2px dashed #ba1cb3; 
            border-radius: 8px; 
            padding: 25px; 
            margin-top: 15px; 
            display: none;
        }
        .logo-container { text-align: center; margin-bottom: 15px; }
        .logo-preview { max-height: 70px; max-width: 100%; object-fit: contain; }
        .recibo-linha { font-size: 13px; margin-bottom: 6px; color: #333; line-height: 1.4; }
        .recibo-total { font-size: 16px; font-weight: bold; color: #ba1cb3; margin-top: 12px; border-top: 1px solid #eee; padding-top: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Novo Orçamento</h1>

    <!-- CONFIGURAÇÃO DA LOGO -->
    <h2>Sua Identidade</h2>
    <div class="field" style="margin-bottom: 12px;">
        <label>Sua Logomarca (PNG ou JPG)</label>
        <input type="file" id="uploadLogo" accept="image/*" onchange="carregarLogo(event)">
    </div>

    <!-- DADOS DO CLIENTE -->
    <h2>Dados do cliente</h2>
    <div class="field" style="margin-bottom: 12px;">
        <label>Buscar Cliente Cadastrado</label>
        <select id="selectCliente" onchange="selecionarCliente()">
            <option value="">-- Selecione um cliente ou digite abaixo --</option>
        </select>
    </div>
    <div class="field" style="margin-bottom: 12px;">
        <label>Nome *</label>
        <input type="text" id="nomeCliente" placeholder="Nome completo do cliente" required>
    </div>
    <div class="row">
        <div class="field">
            <label>E-mail</label>
            <input type="email" id="emailCliente" placeholder="email@exemplo.com">
        </div>
        <div class="field">
            <label>Telefone</label>
            <input type="text" id="telCliente" placeholder="(00) 00000-0000">
        </div>
    </div>

    <!-- ITENS DO ORÇAMENTO -->
    <h2>Itens do orçamento</h2>
    <div class="row">
        <div class="field">
            <label>Produto</label>
            <select id="produto"></select>
        </div>
        <div class="field">
            <label>Tipo - Tamanho</label>
            <select id="tamanho"></select>
        </div>
    </div>

    <div class="row">
        <div class="field">
            <label>Papel</label>
            <select id="papel"></select>
        </div>
        <div class="field">
            <label>Gramatura</label>
            <select id="gramatura">
                <option value="180g">180g</option>
                <option value="240g">240g</option>
            </select>
        </div>
    </div>

    <div class="row">
        <div class="field">
            <label>Cores</label>
            <select id="cores">
                <option value="2x0">2x0</option>
                <option value="4x0">4x0</option>
            </select>
        </div>
        <div class="field">
            <label>Cordão</label>
            <select id="cordao"></select>
        </div>
    </div>

    <!-- ACABAMENTOS / ENNOBRECIMENTO -->
    <h2>Ennobrecimento</h2>
    <div class="row">
        <div class="field"><label>Plastificação</label><select id="plastificacao"><option value="Não">Não</option><option value="Sim">Sim</option></select></div>
        <div class="field"><label>Laminação BOPP</label><select id="laminacao"><option value="Não">Não</option><option value="Sim">Sim</option></select></div>
    </div>
    <div class="row">
        <div class="field"><label>Ilhós</label><select id="ilhos"><option value="Não">Não</option><option value="Sim">Sim</option></select></div>
        <div class="field"><label>Verniz Local</label><select id="verniz"><option value="Não">Não</option><option value="Sim">Sim</option></select></div>
    </div>
    <div class="row">
        <div class="field"><label>Hot Stamping</label><select id="hotstamping"><option value="Não">Não</option><option value="Sim">Sim</option></select></div>
        <div class="field"><label>Gofragem</label><select id="gofragem"><option value="Não">Não</option><option value="Casca de ovo">Casca de ovo</option></select></div>
    </div>
    <div class="row">
        <div class="field"><label>Furo Laço</label><select id="furo"><option value="Não">Não</option><option value="2x0">2x0</option></select></div>
        <div class="field"><label>Quantidade Mínima</label><select id="qtd"><option value="500">500 un</option><option value="1000">1000 un</option></select></div>
    </div>

    <!-- VENDEDOR -->
    <h2>Vendedor</h2>
    <div class="field">
        <label>Nome do vendedor</label>
        <input type="text" id="nomeVendedor" placeholder="Seu nome">
    </div>

    <button class="btn-principal" onclick="calcularOrcamento()">Gerar Orçamento</button>

    <!-- ÁREA DE VISUALIZAÇÃO DO ORÇAMENTO -->
    <div id="bloco-resultado" style="display: none;">
        <h2>Orçamento Gerado</h2>
        <div id="area-orcamento">
            <!-- Estrutura interna montada dinamicamente via JS -->
        </div>
        <button class="btn-exportar" onclick="exportarJpg()">Exportar em JPG</button>
    </div>
    <div style="clear: both;"></div>
</div>

<script>
let bancoDados = {};
let logoBase64 = ""; // Guarda a imagem local convertida com segurança

// Converte o arquivo de logo enviado pelo usuário em formato seguro para exportação
function carregarLogo(event) {
    const arquivo = event.target.files[0];
    if (arquivo) {
        const reader = new FileReader();
        reader.onload = function(e) {
            logoBase64 = e.target.result;
        };
        reader.readAsDataURL(arquivo);
    }
}

window.onload = function() {
    fetch('dados.json')
        .then(response => response.json())
        .then(data => {
            bancoDados = data;
            carregarMenus();
        })
        .catch(error => console.error("Erro ao carregar banco de dados:", error));
};

function carregarMenus() {
    const clienteSel = document.getElementById("selectCliente");
    bancoDados.clientes.forEach((c, index) => {
        clienteSel.options[clienteSel.options.length] = new Option(c.nome, index);
    });

    const prodSel = document.getElementById("produto");
    bancoDados.produtos.forEach(p => prodSel.options[prodSel.options.length] = new Option(p.nome, p.nome));

    const tamSel = document.getElementById("tamanho");
    bancoDados.tamanhos.forEach(t => {
        let opt = new Option(t.nome, t.nome);
        opt.dataset.preco = t.preco;
        tamSel.add(opt);
    });

    const papelSel = document.getElementById("papel");
    bancoDados.papeis.forEach(p => {
        let opt = new Option(p.nome, p.nome);
        opt.dataset.preco = p.preco;
        papelSel.add(opt);
    });

    const cordaoSel = document.getElementById("cordao");
    bancoDados.cordoes.forEach(c => {
        let opt = new Option(c.nome, c.nome);
        opt.dataset.preco = c.preco;
        cordaoSel.add(opt);
    });
}

function selecionarCliente() {
    const idx = document.getElementById("selectCliente").value;
    if(idx !== "") {
        const cliente = bancoDados.clientes[idx];
        document.getElementById("nomeCliente").value = cliente.nome;
        document.getElementById("emailCliente").value = cliente.email;
        document.getElementById("telCliente").value = cliente.telefone;
    }
}

function calcularOrcamento() {
    const tamSelect = document.getElementById("tamanho");
    const papelSelect = document.getElementById("papel");
    const cordaoSelect = document.getElementById("cordao");
    
    let custoUnitario = 0;
    custoUnitario += parseFloat(tamSelect.options[tamSelect.selectedIndex].dataset.preco || 0);
    custoUnitario += parseFloat(papelSelect.options[papelSelect.selectedIndex].dataset.preco || 0);
    custoUnitario += parseFloat(cordaoSelect.options[cordaoSelect.selectedIndex].dataset.preco || 0);
    
    const tabelaAcabamentos = bancoDados.valoresAcabamento;
    let acabamentosAtivos = [];
    if(document.getElementById("plastificacao").value === "Sim") { custoUnitario += tabelaAcabamentos.plastificacao; acabamentosAtivos.push("Plastificação"); }
    if(document.getElementById("laminacao").value === "Sim") { custoUnitario += tabelaAcabamentos.laminacao; acabamentosAtivos.push("Laminação BOPP"); }
    if(document.getElementById("ilhos").value === "Sim") { custoUnitario += tabelaAcabamentos.ilhos; acabamentosAtivos.push("Ilhós"); }
    if(document.getElementById("verniz").value === "Sim") { custoUnitario += tabelaAcabamentos.verniz; acabamentosAtivos.push("Verniz Local"); }
    if(document.getElementById("hotstamping").value === "Sim") { custoUnitario += tabelaAcabamentos.hotstamping; acabamentosAtivos.push("Hot Stamping"); }
    if(document.getElementById("gofragem").value !== "Não") { custoUnitario += tabelaAcabamentos.gofragem; acabamentosAtivos.push("Gofragem ("+document.getElementById("gofragem").value+")"); }

    const qtd = parseInt(document.getElementById("qtd").value);
    const valorTotal = custoUnitario * qtd;

    // Se houver logo, insere a imagem no topo do recibo
    let tagLogo = logoBase64 ? `<div class="logo-container"><img class="logo-preview" src="${logoBase64}"></div>` : '';

    let htmlOrcamento = `
        ${tagLogo}
        <div class="recibo-linha" style="font-weight: bold; text-align: center; font-size: 15px; margin-bottom: 15px; color: #ba1cb3;">PROPOSTA COMERCIAL DE EMBALAGENS</div>
        <div class="recibo-linha"><strong>Cliente:</strong> ${document.getElementById("nomeCliente").value || 'Não informado'}</div>
        <div class="recibo-linha"><strong>E-mail:</strong> ${document.getElementById("emailCliente").value || 'Não informado'}</div>
        <div class="recibo-linha"><strong>Telefone:</strong> ${document.getElementById("telCliente").value || 'Não informado'}</div>
        <div class="recibo-linha" style="border-bottom: 1px dashed #ccc; margin: 10px 0;"></div>
        <div class="recibo-linha"><strong>Produto:</strong> ${document.getElementById("produto").value} - Tam: ${tamSelect.value}</div>
        <div class="recibo-linha"><strong>Especificações:</strong> Papel ${papelSelect.value} ${document.getElementById("gramatura").value} | Cores: ${document.getElementById("cores").value}</div>
        <div class="recibo-linha"><strong>Cordão:</strong> ${cordaoSelect.value}</div>
        <div class="recibo-linha"><strong>Acabamentos:</strong> ${acabamentosAtivos.length > 0 ? acabamentosAtivos.join(", ") : "Nenhum"}</div>
        <div class="recibo-linha" style="border-bottom: 1px dashed #ccc; margin: 10px 0;"></div>
        <div class="recibo-linha"><strong>Quantidade:</strong> ${qtd} unidades</div>
        <div class="recibo-linha"><strong>Valor Unitário:</strong> R$ ${custoUnitario.toFixed(2)}</div>
        <div class="recibo-total">VALOR TOTAL: R$ ${valorTotal.toFixed(2)}</div>
        <div class="recibo-linha" style="margin-top: 15px; font-size: 11px; color: #777; text-align: center;">Atendido por: ${document.getElementById("nomeVendedor").value || 'Equipe Comercial'}</div>
    `;

    document.getElementById("area-orcamento").innerHTML = htmlOrcamento;
    document.getElementById("area-orcamento").style.display = "block";
    document.getElementById("bloco-resultado").style.display = "block";
}

function exportarJpg() {
    const alvo = document.getElementById("area-orcamento");
    
    // Configurações extras de segurança para forçar o desenho da logo local
    html2canvas(alvo, { 
        scale: 2,
        useCORS: true, 
        allowTaint: true,
        logging: false
    }).then(canvas => {
        try {
            const imagemUrl = canvas.toDataURL("image/jpeg", 0.95);
            
            // Método definitivo de download compatível com GitHub Pages e arquivos locais
            const link = document.createElement("a");
            link.setAttribute("href", imagemUrl);
            link.setAttribute("download", `Orcamento_${document.getElementById("nomeCliente").value || 'Cliente'}.jpg`);
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        } catch(e) {
            alert("Atenção: Para exportar a imagem corretamente, o sistema precisa estar rodando online no GitHub Pages ou em um servidor local.");
            console.error(e);
        }
    });
}
</script>
</body>
</html>
