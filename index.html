<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Orçamentos Comercial</title>
    
    <!-- BIBLIOTECA PARA CONVERTER HTML EM IMAGEM JPG -->
    <script src="https://cloudflare.com"></script>
    
    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        body { background-color: #f4f4f6; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 600px; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { font-size: 24px; margin-bottom: 20px; color: #000; }
        h2 { font-size: 14px; margin: 15px 0 10px 0; color: #333; font-weight: bold; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        .row { display: flex; gap: 15px; margin-bottom: 12px; }
        .field { flex: 1; display: flex; flex-direction: column; }
        label { font-size: 11px; margin-bottom: 4px; color: #555; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 13px; outline: none; background: #fff; }
        input:focus, select:focus { border-color: #ba1cb3; }
        
        .btn-principal { width: 100%; background: #ba1cb3; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: bold; margin: 15px 0; }
        .btn-principal:hover { background: #9e1497; }
        .btn-exportar { background: #00bcd4; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; float: right; margin-top: 15px; font-weight: bold; width: 100%; }
        .btn-exportar:hover { background: #0097a7; }
        
        /* ESTILO DA FOLHA DO ORÇAMENTO */
        #area-orcamento { background: #ffffff; padding: 30px; margin-top: 15px; display: block; color: #333; width: 100%; max-width: 540px; }
        .logos-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #ba1cb3; padding-bottom: 15px; gap: 15px; }
        .logo-box { flex: 1; display: flex; align-items: center; }
        .logo-box img { max-height: 55px; max-width: 150px; object-fit: contain; display: block; }
        .cliente-box { display: flex; justify-content: flex-end; gap: 8px; font-size: 12px; font-weight: bold; color: #555; }
        .secao-pdf { margin-bottom: 15px; background: #fafafa; padding: 12px; border-radius: 6px; border-left: 3px solid #ba1cb3; }
        .secao-titulo { font-size: 10px; font-weight: bold; text-transform: uppercase; color: #777; margin-bottom: 5px; }
        .recibo-linha { font-size: 12px; margin-bottom: 4px; line-height: 1.4; color: #444; }
        
        /* TABELA */
        .tabela-itens { width: 100%; border-collapse: collapse; margin: 10px 0; }
        .tabela-itens th { background: #ba1cb3; color: white; font-size: 11px; padding: 6px; text-align: left; }
        .tabela-itens td { padding: 8px 6px; border-bottom: 1px solid #eee; font-size: 12px; }
        .recibo-total { font-size: 16px; font-weight: bold; color: #ba1cb3; text-align: right; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Novo Orçamento</h1>

    <!-- LOGO DO CLIENTE (OPCIONAL) -->
    <h2>Arte do Cliente</h2>
    <div class="field" style="margin-bottom: 12px;">
        <label>Logo do Cliente (PNG ou JPG)</label>
        <input type="file" id="uploadLogoCliente" accept="image/*" onchange="carregarLogoCliente(event)">
    </div>

    <!-- DADOS DO CLIENTE -->
    <h2>Dados do cliente</h2>
    <div class="field" style="margin-bottom: 12px;">
        <label>Buscar Cliente Cadastrado</label>
        <select id="selectCliente" onchange="selecionarCliente()">
            <option value="">-- Selecione um cliente --</option>
        </select>
    </div>
    <div class="field" style="margin-bottom: 12px;">
        <label>Nome *</label>
        <input type="text" id="nomeCliente" placeholder="Nome do cliente ou Empresa" required>
    </div>
    <div class="row">
        <div class="field"><label>E-mail</label><input type="email" id="emailCliente"></div>
        <div class="field"><label>Telefone</label><input type="text" id="telCliente"></div>
    </div>

    <!-- ITENS -->
    <h2>Itens do orçamento</h2>
    <div class="row">
        <div class="field"><label>Produto</label><select id="produto"></select></div>
        <div class="field"><label>Tipo - Tamanho</label><select id="tamanho"></select></div>
    </div>
    <div class="row">
        <div class="field"><label>Papel</label><select id="papel"></select></div>
        <div class="field"><label>Gramatura</label><select id="gramatura"><option value="180g">180g</option><option value="240g">240g</option></select></div>
    </div>
    <div class="row">
        <div class="field"><label>Cores</label><select id="cores"><option value="2x0">2x0</option><option value="4x0">4x0</option></select></div>
        <div class="field"><label>Cordão</label><select id="cordao"></select></div>
    </div>

    <!-- ACABAMENTOS -->
    <h2>Ennobrecimento</h2>
    <div class="row">
        <div class="field"><label>Plastificação</label><select id="plastificacao"><option value="Não">Não</option><option value="Sim">Sim</option></select></div>
        <div class="field"><label>Laminação BOPP</label><select id="laminacao"><option value="Não">Não</option><option value="Sim">Sim</option></select></div>
    </div>
    <div class="row">
        <div class="field"><label>Ilhós</label><select id="ilhos"><option value="Não">Não</option><option value="Sim">Sim</option></select></div>
        <div class="field"><label>Verniz Local</label><select id="verniz"><option value="Não">Não</option><option value="Sim">Sim</option></select></div>
    </div>
    <div class="row">
        <div class="field"><label>Hot Stamping</label><select id="hotstamping"><option value="Não">Não</option><option value="Sim">Sim</option></select></div>
        <div class="field"><label>Quantidade</label><select id="qtd"><option value="500">500 un</option><option value="1000">1000 un</option></select></div>
    </div>

    <div class="field">
        <label>Nome do vendedor</label>
        <input type="text" id="nomeVendedor" placeholder="Seu nome">
    </div>

    <button class="btn-principal" onclick="gerarPropostaCompleta()">Gerar Orçamento</button>

    <!-- ÁREA DE PREVIEW E EXPORTAÇÃO DIRETA -->
    <div id="bloco-resultado" style="display: none;">
        <div id="area-orcamento">
            <!-- Renderizado dinamicamente -->
        </div>
        <button class="btn-exportar" onclick="exportarJpgDireto()">Exportar Orçamento em JPG</button>
    </div>
</div>

<script>
let bancoDados = { clientes: [], produtos: [], tamanhos: [], papeis: [], cordoes: [], valoresAcabamento: {} };
let logoClienteBase64 = "";

function carregarLogoCliente(event) {
    const arquivo = event.target.files[0];
    if (arquivo) {
        const reader = new FileReader();
        reader.onload = function(e) { logoClienteBase64 = e.target.result; };
        reader.readAsDataURL(arquivo);
    }
}

window.onload = function() {
    // Carrega dados simulados caso o arquivo JSON falhe localmente
    fetch('dados.json')
        .then(response => response.json())
        .then(data => {
            bancoDados = data;
            const clientesLocais = JSON.parse(localStorage.getItem('clientesSalvosAutomático')) || [];
            bancoDados.clientes = [...bancoDados.clientes, ...clientesLocais];
            carregarMenus();
        })
        .catch(error => {
            console.warn("Criando base de dados temporária para testes locais.");
            bancoDados = {
                clientes: [{nome: "Empresa Exemplo LTDA", email: "cliente@teste.com", tel: "(11) 99999-9999"}],
                produtos: ["Tags Comercial", "Cartões de Visita"],
                tamanhos: ["5x5 cm", "9x5 cm"],
                papeis: ["Couché", "Offset"],
                cordoes: ["Nylon", "Algodão"]
            };
            carregarMenus();
        });
};

function carregarMenus() {
    const clienteSel = document.getElementById("selectCliente");
    clienteSel.innerHTML = '<option value="">-- Selecione um cliente --</option>';
    bancoDados.clientes.forEach((c, index) => { clienteSel.options[clienteSel.options.length] = new Option(c.nome, index); });
    
    const prodSel = document.getElementById("produto");
    prodSel.innerHTML = '';
    bancoDados.produtos.forEach(p => prodSel.options[prodSel.options.length] = new Option(p, p));

    const tamSel = document.getElementById("tamanho");
    tamSel.innerHTML = '';
    bancoDados.tamanhos.forEach(t => tamSel.options[tamSel.options.length] = new Option(t, t));

    const papSel = document.getElementById("papel");
    papSel.innerHTML = '';
    bancoDados.papeis.forEach(pa => papSel.options[papSel.options.length] = new Option(pa, pa));

    const cordSel = document.getElementById("cordao");
    cordSel.innerHTML = '';
    bancoDados.cordoes.forEach(co => cordSel.options[cordSel.options.length] = new Option(co, co));
}

function selecionarCliente() {
    const idx = document.getElementById("selectCliente").value;
    if(idx !== "") {
        const c = bancoDados.clientes[idx];
        document.getElementById("nomeCliente").value = c.nome;
        document.getElementById("emailCliente").value = c.email || '';
        document.getElementById("telCliente").value = c.tel || '';
    }
}

function gerarPropostaCompleta() {
    const nome = document.getElementById("nomeCliente").value;
    if(!nome) { alert("Por favor, preencha o nome do cliente."); return; }

    const email = document.getElementById("emailCliente").value;
    const tel = document.getElementById("telCliente").value;
    const prod = document.getElementById("produto").value;
    const tam = document.getElementById("tamanho").value;
    const papel = document.getElementById("papel").value;
    const grama = document.getElementById("gramatura").value;
    const cores = document.getElementById("cores").value;
    const cordao = document.getElementById("cordao").value;
    const qtd = document.getElementById("qtd").value;
    const vendedor = document.getElementById("nomeVendedor").value || "Comercial";

    // Criação dinâmica da folha de orçamento
    let htmlOrcamento = `
        <div class="logos-header">
            <div class="logo-box">
                ${logoClienteBase64 ? `<img src="${logoClienteBase64}" alt="Logo Cliente">` : `<h3>${nome}</h3>`}
            </div>
            <div class="cliente-box">
                <div>Orçamento Comercial</div>
            </div>
        </div>
        <div class="secao-pdf">
            <div class="secao-titulo">Dados do Cliente</div>
            <div class="recibo-linha"><strong>Nome:</strong> ${nome}</div>
            ${email ? `<div class="recibo-linha"><strong>E-mail:</strong> ${email}</div>` : ''}
            ${tel ? `<div class="recibo-linha"><strong>Telefone:</strong> ${tel}</div>` : ''}
        </div>
        <div class="secao-pdf">
            <div class="secao-titulo">Especificações do Pedido</div>
            <table class="tabela-itens">
                <thead>
                    <tr><th>Item</th><th>Configuração</th><th>Qtd</th></tr>
                </thead>
                <tbody>
                    <tr>
                        <td>${prod}</td>
                        <td>${tam} - ${papel} ${grama} - Cores: ${cores} - Cordão: ${cordao}</td>
                        <td>${qtd} un</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="recibo-total">Emissão: ${new Date().toLocaleDateString('pt-BR')}</div>
        <div style="font-size: 11px; margin-top: 15px; color: #777;">Atendido por: ${vendedor}</div>
    `;

    document.getElementById("area-orcamento").innerHTML = htmlOrcamento;
    document.getElementById("bloco-resultado").style.display = "block";
    
    // Rola a página suavemente até o preview do orçamento
    document.getElementById("bloco-resultado").scrollIntoView({ behavior: 'smooth' });
}

function exportarJpgDireto() {
    const alvo = document.getElementById("area-orcamento");
    
    // html2canvas renderiza a div selecionada e converte em imagem base64
    html2canvas(alvo, {
        scale: 2, // Melhora a resolução e nitidez do texto no JPG final
        useCORS: true // Evita travamento com imagens vindas de fora
    }).then(canvas => {
        const dataUrl = canvas.toDataURL("image/jpeg", 0.95); // Converte para formato JPG
        
        // Dispara o download automático do navegador
        const link = document.createElement("a");
        const nomeCliente = document.getElementById("nomeCliente").value.replace(/\s+/g, '_');
        link.download = `Orcamento_${nomeCliente}.jpg`;
        link.href = dataUrl;
        link.click();
    }).catch(err => {
        console.error("Falha ao gerar o arquivo JPG:", err);
        alert("Erro técnico ao exportar o JPG.");
    });
}
</script>
</body>
</html>
