<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Orçamento - Comunicação Visual</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --background: #f8fafc;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            width: 100%;
            max-width: 600px;
        }

        h2 {
            margin-bottom: 20px;
            color: var(--primary);
            text-align: center;
        }

        .section-title {
            font-size: 1.1rem;
            margin: 20px 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 2px solid var(--border);
            color: #64748b;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .btn-whatsapp {
            background-color: #25d366;
        }

        .btn-whatsapp:hover {
            background-color: #20ba5a;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Gerador de Orçamento</h2>
    
    <form id="orcamentoForm">
        <!-- Dados do Cliente -->
        <div class="section-title">Dados do Cliente</div>
        
        <div class="form-group">
            <label for="nome">Nome Completo *</label>
            <input type="text" id="nome" required placeholder="Ex: João Silva">
        </div>
        
        <div class="row">
            <div class="form-group">
                <label for="whatsapp">WhatsApp / Tel *</label>
                <input type="tel" id="whatsapp" required placeholder="(00) 00000-0000">
            </div>
            <div class="form-group">
                <label for="email">E-mail *</label>
                <input type="email" id="email" required placeholder="cliente@email.com">
            </div>
        </div>

        <!-- Especificações do Produto -->
        <div class="section-title">Especificações Técnicas</div>
        
        <div class="form-group">
            <label for="produto">Descrição do Produto</label>
            <input type="text" id="produto" placeholder="Ex: Banner em Lona, Panfleto, Brinde">
        </div>

        <div class="row">
            <div class="form-group">
                <label for="cores">Padrão de Cores (Gráfico)</label>
                <select id="cores">
                    <option value="4x0 (Colorido Frente)">4x0 (Colorido Frente)</option>
                    <option value="4x1 (Colorido Frente / Verso Preto e Branco)">4x1 (Colorido / Verso P&B)</option>
                    <option value="4x4 (Colorido Frente e Verso)">4x4 (Colorido Frente/Verso)</option>
                    <option value="1x0 (Preto e Branco Frente)">1x0 (Preto e Branco Frente)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="quantidade">Tiragem / Quantidade</label>
                <select id="quantidade">
                    <option value="1">1 unidade</option>
                    <option value="500">500 unidades</option>
                    <option value="1000">1000 unidades</option>
                    <option value="2000">2000 unidades</option>
                </select>
            </div>
        </div>

        <!-- Acabamento estrutural -->
        <div class="row">
            <div class="form-group">
                <label for="ilhos">Possui Ilhós?</label>
                <select id="ilhos">
                    <option value="Não">Não</option>
                    <option value="Sim">Sim</option>
                </select>
            </div>
            <div class="form-group">
                <label for="acabamento">Cordão / Alça / Furo</label>
                <select id="acabamento">
                    <option value="Nenhum">Nenhum</option>
                    <option value="Cordão de Nylon">Cordão de Nylon</option>
                    <option value="Alça de fita">Alça de fita</option>
                    <option value="Furo para laço">Furo para laço</option>
                </select>
            </div>
        </div>

        <!-- Valores e Condições -->
        <div class="section-title">Valores e Condições</div>
        
        <div class="row">
            <div class="form-group">
                <label for="valor">Valor Total (R$)</label>
                <input type="number" id="valor" step="0.01" placeholder="0,00">
            </div>
            <div class="form-group">
                <label for="validade">Validade da Proposta</label>
                <select id="validade">
                    <option value="5 dias">5 dias</option>
                    <option value="10 dias">10 dias</option>
                    <option value="15 dias">15 dias</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="obs">Observações Adicionais</label>
            <textarea id="obs" rows="3" placeholder="Prazo de entrega, forma de pagamento..."></textarea>
        </div>

        <!-- Ações -->
        <button type="button" onclick="gerarPDF()">Exportar Orçamento (Log)</button>
        <button type="button" class="btn-whatsapp" onclick="enviarWhatsApp()">Enviar via WhatsApp</button>
    </form>
</div>

<script>
    // Função para capturar dados do formulário
    function obterDados() {
        return {
            nome: document.getElementById('nome').value,
            whatsapp: document.getElementById('whatsapp').value,
            email: document.getElementById('email').value,
            produto: document.getElementById('produto').value || 'Não informado',
            cores: document.getElementById('cores').value,
            quantidade: document.getElementById('quantidade').value,
            ilhos: document.getElementById('ilhos').value,
            acabamento: document.getElementById('acabamento').value,
            valor: document.getElementById('valor').value ? 'R$ ' + parseFloat(document.getElementById('valor').value).toFixed(2) : 'A combinar',
            validade: document.getElementById('validade').value,
            obs: document.getElementById('obs').value || 'Nenhuma'
        };
    }

    // Ação 1: Simula exportação dos dados estruturados no console
    function gerarPDF() {
        const dados = obterDados();
        if(!dados.nome || !dados.whatsapp || !dados.email) {
            alert('Por favor, preencha os campos obrigatórios (*)');
            return;
        }
        
        console.log("--- DADOS DO ORÇAMENTO GERADO ---", dados);
        alert('Orçamento processado com sucesso comercial! Verifique o console do navegador (F12) para visualizar o objeto JSON estruturado.');
    }

    // Ação 2: Dispara os dados diretamente para o WhatsApp do cliente
    function enviarWhatsApp() {
        const dados = obterDados();
        if(!dados.nome || !dados.whatsapp || !dados.email) {
            alert('Por favor, preencha os campos obrigatórios (*)');
            return;
        }

        // Formata a mensagem de texto limpa para envio profissional
        const mensagem = `*ORÇAMENTO COMERCIAL*%0A%0A` +
            `*Cliente:* ${dados.nome}%0A` +
            `*E-mail:* ${dados.email}%0A%0A` +
            `*Item:* ${dados.produto}%0A` +
            `*Quantidade:* ${dados.quantidade} un%0A` +
            `*Cores:* ${dados.cores}%0A` +
            `*Ilhós:* ${dados.ilhos}%0A` +
            `*Acabamento:* ${dados.acabamento}%0A%0A` +
            `*Valor Total:* ${dados.valor}%0A` +
            `*Validade:* ${dados.validade}%0A` +
            `*Obs:* ${dados.obs}`;

        // Limpa caracteres não numéricos do telefone para API do WhatsApp
        const telefoneLimpo = dados.whatsapp.replace(/\D/g, '');
        
        // Abre o link do WhatsApp Web/App
        const url = `https://whatsapp.com{telefoneLimpo}&text=${mensagem}`;
        window.open(url, '_blank');
    }
</script>

</body>
</html>
